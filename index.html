<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERLC Server Command Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel-container {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #3b82f6;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #a1a1aa;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #3f3f46;
            background-color: #27272a;
            color: #ffffff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
        #statusMessage {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }
        .success { background-color: #065f46; color: #34d399; }
        .error { background-color: #991b1b; color: #f87171; }
    </style>
</head>
<body>

<div class="panel-container">
    <h2>ERLC Command Panel</h2>
    
    <div class="form-group">
        <label for="apiKey">ERLC API Server Key:</label>
        <input type="password" id="apiKey" placeholder="Server-API-Key-Here">
    </div>

    <div class="form-group">
        <label for="command">Command:</label>
        <input type="text" id="command" placeholder="e.g., :h, :kick, :slay">
    </div>

    <div class="form-group">
        <label for="player">Player (Optional):</label>
        <input type="text" id="player" placeholder="Username or UserId">
    </div>

    <button onclick="sendCommand()">Send Command</button>

    <div id="statusMessage"></div>
</div>

<script>
    async function sendCommand() {
        const apiKey = document.getElementById('apiKey').value;
        const commandText = document.getElementById('command').value;
        const playerText = document.getElementById('player').value;
        const statusDiv = document.getElementById('statusMessage');

        // Reset status message
        statusDiv.style.display = 'none';
        statusDiv.className = '';

        if (!apiKey || !commandText) {
            showStatus('Please provide both the API Key and a Command.', 'error');
            return;
        }

        // Build the payload expected by the ERLC API
        // Format: "command": ":kick PlayerName" or just ":h Hello"
        let fullCommand = commandText;
        if (playerText) {
            fullCommand = `${commandText} ${playerText}`;
        }

        const payload = {
            command: fullCommand
        };

        try {
            const response = await fetch('https://api.erlc.gg/command', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Server-API-Key': apiKey
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showStatus('Command sent successfully!', 'success');
            } else {
                const errorData = await response.text();
                showStatus(`Failed: ${response.status} - ${errorData || 'Check API Key/Permissions'}`, 'error');
            }
        } catch (error) {
            showStatus(`Error: Network issue or CORS block.`, 'error');
            console.error('Fetch error:', error);
        }
    }

    function showStatus(message, type) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerText = message;
        statusDiv.className = type;
        statusDiv.style.display = 'block';
    }
</script>

</body>
</html>
