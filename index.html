<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Ember</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Setup the body to cover the full viewport and center content */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Replace the URL below with your actual GIF link */
            background-image: url('https://i0.wp.com/media2.giphy.com/media/xTiTnkE9isjhcW6DMk/giphy.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Style the button to make it pop */
        .centered-button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background-color: #ff4757;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        /* Add a slight hover effect */
        .centered-button:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <button class="centered-button">Click Me</button>

</body>
</html>
