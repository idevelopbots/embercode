<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Angeles Roleplay Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    min-height: 100vh;
    background: #090a0f;
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    overflow-x: hidden;
}

.overlay {
    width: 100%;
    min-height: 100vh;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: row;
    background: rgba(9, 10, 15, 0.45); 
}

/* Main content workspace */
.main {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 30px;
    max-height: 100vh;
    overflow-y: auto;
}

/* Sleek Server Header Banner */
.server-header {
    text-align: center;
    background: rgba(15, 17, 23, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 24px 40px;
    align-self: center;
    min-width: 480px;
    max-width: 100%;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}

#serverName {
    color: #ffffff;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

#joinCode {
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
    margin-top: 10px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 4px 12px;
    border-radius: 8px;
    display: inline-block;
    letter-spacing: 0.5px;
}

#playerStats {
    color: #60a5fa;
    margin-top: 12px;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Dynamic Cards Grid */
.cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    flex: 1;
    align-items: stretch;
}

/* Glassmorphism Panels */
.plate-card, .staff-card {
    background: rgba(15, 17, 23, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 240px);
}

.plate-card h2, .staff-card h2 {
    color: #ffffff;
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: 700;
    border-left: 4px solid #3b82f6;
    padding-left: 10px;
}

/* Custom Scrollable Areas */
#vehicleList, #staffList, .player-list {
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
}

/* Consistent Minimal Scrollbars */
#vehicleList::-webkit-scrollbar,
#staffList::-webkit-scrollbar,
.player-list::-webkit-scrollbar {
    width: 6px;
}
#vehicleList::-webkit-scrollbar-track,
#staffList::-webkit-scrollbar-track,
.player-list::-webkit-scrollbar-track {
    background: transparent;
}
#vehicleList::-webkit-scrollbar-thumb,
#staffList::-webkit-scrollbar-thumb,
.player-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
}
#vehicleList::-webkit-scrollbar-thumb:hover,
#staffList::-webkit-scrollbar-thumb:hover,
.player-list::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.25);
}

/* Cards & Items inside lists */
.vehicle-item, .staff-item {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    color: #f8fafc;
    transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
}

.vehicle-item:hover, .staff-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.1);
}

.vehicle-owner {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 6px;
}

/* Distinct Role Badges */
.staff-wrapper {
    margin-top: 8px;
}

.staff-role {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 6px;
    display: inline-block;
}

/* Staff Badges */
.role-admin {
    color: #fda4af;
    background: rgba(244, 63, 94, 0.15);
    border: 1px solid rgba(244, 63, 94, 0.2);
}

.role-mod {
    color: #d8b4fe;
    background: rgba(168, 85, 247, 0.15);
    border: 1px solid rgba(168, 85, 247, 0.2);
}

.role-helper {
    color: #6ee7b7;
    background: rgba(16, 185, 129, 0.15);
    border: 1px solid rgba(16, 185, 129, 0.2);
}

/* Side Player Panel CSS */
.player-panel {
    width: 380px;
    background: rgba(10, 12, 18, 0.65);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    box-shadow: -10px 0 40px rgba(0,0,0,0.4);
    height: 100vh;
}

.player-panel-header {
    padding: 30px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

.player-panel-header h2 {
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
}

#playerCount {
    color: #94a3b8;
    margin-top: 6px;
    font-size: 14px;
    font-weight: 500;
}

.player-list {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
}

.player-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.player-card:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
}

.player-name {
    color: #ffffff;
    font-weight: 600;
    font-size: 15px;
}

.player-team {
    color: #cbd5e1;
    margin-top: 6px;
    font-size: 12px;
    font-weight: 600;
    display: inline-block;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 2px 8px;
    border-radius: 6px;
}

.loading {
    color: #64748b;
    text-align: center;
    margin-top: 35px;
    font-size: 14px;
    font-style: italic;
    letter-spacing: 0.5px;
}

/* Responsiveness on screens smaller than 1024px */
@media (max-width: 1024px) {
    .overlay {
        flex-direction: column;
        overflow-y: auto;
    }
    .main {
        max-height: none;
        padding: 24px;
        overflow-y: visible;
    }
    .player-panel {
        width: 100%;
        height: auto;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    }
    .player-list {
        max-height: 400px;
    }
    .server-header {
        min-width: 100%;
    }
    .plate-card, .staff-card {
        max-height: 450px;
    }
}
</style>
</head>

<body>

<div class="overlay">

    <div class="main">

        <div class="server-header">
            <div id="serverName">Loading Server...</div>
            <div id="joinCode">Join Code: ------</div>
            <div id="playerStats">Loading...</div>
        </div>

        <div class="cards-container">
            <div class="plate-card">
                <h2>Vehicles</h2>
                <div id="vehicleList">
                    <div class="loading">Loading vehicles...</div>
                </div>
            </div>

            <div class="staff-card">
                <h2>Server Administration</h2>
                <div id="staffList">
                    <div class="loading">Loading staff...</div>
                </div>
            </div>
        </div>

    </div>

    <div class="player-panel">

        <div class="player-panel-header">
            <h2>Players</h2>
            <div id="playerCount">Loading...</div>
        </div>

        <div class="player-list" id="playerList">
            <div class="loading">Loading players...</div>
        </div>

    </div>

</div>

<script>
async function loadServerData() {
    try {
        const [serverResponse, playersResponse, vehiclesResponse, staffResponse] =
            await Promise.all([
                fetch("/api/server"),
                fetch("/api/players"),
                fetch("/api/vehicles"),
                fetch("/api/staff")
            ]);

        const serverData = await serverResponse.json();
        const players = await playersResponse.json();
        const vehicles = await vehiclesResponse.json();
        const staff = await staffResponse.json();

        // Update Server Stats
        document.getElementById("serverName").textContent =
            serverData.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (serverData.JoinKey || "N/A");

        document.getElementById("playerStats").textContent =
            `${serverData.CurrentPlayers || 0}/${serverData.MaxPlayers || 0} Players`;

        document.getElementById("playerCount").textContent =
            `${players.length} Players Online`;

        // Update Player List
        const playerList = document.getElementById("playerList");
        playerList.innerHTML = "";

        if(players.length === 0){
            playerList.innerHTML = '<div class="loading">No players online.</div>';
        } else {
            players.forEach(player => {
                const card = document.createElement("div");
                card.className = "player-card";
                card.innerHTML = `
                    <div class="player-name">${player.Player || "Unknown"}</div>
                    <div class="player-team">${player.Team || "Civilian"}</div>
                `;
                playerList.appendChild(card);
            });
        }

        // Update Vehicles List
        const vehicleList = document.getElementById("vehicleList");
        vehicleList.innerHTML = "";

        if(!vehicles || vehicles.length === 0){
            vehicleList.innerHTML = '<div class="loading">No active vehicles.</div>';
        } else {
            vehicles.forEach(veh => {
                const item = document.createElement("div");
                item.className = "vehicle-item";
                item.innerHTML = `
                    <strong>${veh.Name || "Unknown Vehicle"}</strong>
                    <div class="vehicle-owner">Plate: ${veh.Plate || "N/A"} • Owner: ${veh.Owner || "Unknown"}</div>
                `;
                vehicleList.appendChild(item);
            });
        }

        // Update Staff List
        const staffList = document.getElementById("staffList");
        staffList.innerHTML = "";

        const admins = staff?.Staff?.Admins || {};
        const mods = staff?.Staff?.Mods || {};
        const helpers = staff?.Staff?.Helpers || {};

        let hasStaff = false;

        Object.values(admins).forEach(admin => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "staff-item";
            item.innerHTML = `
                <strong>👑 ${admin}</strong>
                <div class="staff-wrapper">
                    <span class="staff-role role-admin">Administrator</span>
                </div>
            `;
            staffList.appendChild(item);
        });

        Object.values(mods).forEach(mod => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "staff-item";
            item.innerHTML = `
                <strong>🔨 ${mod}</strong>
                <div class="staff-wrapper">
                    <span class="staff-role role-mod">Moderator</span>
                </div>
            `;
            staffList.appendChild(item);
        });

        Object.values(helpers).forEach(helper => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "staff-item";
            item.innerHTML = `
                <strong>⭐ ${helper}</strong>
                <div class="staff-wrapper">
                    <span class="staff-role role-helper">Helper</span>
                </div>
            `;
            staffList.appendChild(item);
        });

        if (!hasStaff) {
            staffList.innerHTML = '<div class="loading">No staff active.</div>';
        }

    } catch(error){
        console.error(error);
        document.getElementById("serverName").textContent = "Connection Failed";
        document.getElementById("joinCode").textContent = "Unable to contact API";
    }
}

loadServerData();
setInterval(loadServerData, 5000);
</script>

</body>
</html>
