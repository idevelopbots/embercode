<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Background Page</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Full-screen background */
        .bg-background {
            height: 100vh;
            width: 100%;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* Logo */
        .top-right-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            object-fit: contain;
            z-index: 10;
        }

        /* Content card */
        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            padding: 40px;
            border-radius: 12px;
            text-align: center;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);

            max-width: 500px;
            width: 90%;
        }

        .content-card h1 {
            color: #333;
            margin-bottom: 15px;
        }

        .content-card p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="bg-background">

        <!-- Logo -->
        <img
            class="top-right-logo"
            src="https://media.discordapp.net/attachments/1524884039184679092/1524913925911482388/7c8b57e10015b77642067173e7460e4b.png?ex=6a517a43&is=6a5028c3&hm=bb0fad28473c42ba4b64f6f4b912b048d7616cbdcf6eedbe50ebc720fb8c7117&="
            alt="Logo"
        >

        <!-- Main Content -->
        <div class="content-card">
            <h1>Welcome to My Page</h1>

            <p>
                This is a starter template using your requested image as a
                full-screen background. You can replace this text and build
                your project right inside this card.
            </p>
        </div>

    </div>

</body>
</html>
