<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Angeles Roleplay Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* Modern Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    background: #050505;
    background-image: 
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%),
        url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: #e2e8f0;
    overflow-x: hidden;
}

.overlay {
    width: 100%;
    min-height: 100vh;
    background: rgba(5, 5, 10, 0.65); 
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    flex-direction: row;
}

/* Animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Main Content Workspace */
.main {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    max-height: 100vh;
    overflow-y: auto;
}

/* Sleek Server Header Banner */
.server-header {
    text-align: center;
    background: rgba(20, 22, 30, 0.4);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 32px 48px;
    align-self: center;
    min-width: 500px;
    max-width: 100%;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255,255,255,0.02);
    animation: fadeInUp 0.6s ease-out;
}

#serverName {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 20px rgba(165, 180, 252, 0.2);
    margin-bottom: 12px;
}

.header-badges {
    display: flex;
    justify-content: center;
    gap: 16px;
    align-items: center;
}

#joinCode {
    color: #cbd5e1;
    font-size: 14px;
    font-weight: 500;
    font-family: 'ui-monospace', 'SFMono-Regular', Menlo, monospace;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 6px 16px;
    border-radius: 12px;
    letter-spacing: 0.05em;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}

#playerStats {
    color: #60a5fa;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.05em;
    background: rgba(59, 130, 246, 0.1);
    padding: 6px 16px;
    border-radius: 12px;
    border: 1px solid rgba(59, 130, 246, 0.2);
}

/* Dynamic Cards Grid */
.cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 32px;
    flex: 1;
    align-items: stretch;
    animation: fadeInUp 0.8s ease-out 0.1s both;
}

/* Glassmorphism Panels */
.glass-panel {
    background: rgba(15, 17, 23, 0.4);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 260px);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.glass-panel:hover {
    transform: translateY(-4px);
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.08);
}

.glass-panel h2 {
    color: #f8fafc;
    margin-bottom: 24px;
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
}

.glass-panel h2::before {
    content: '';
    display: block;
    width: 4px;
    height: 24px;
    background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
    border-radius: 4px;
}

/* Custom Scrollable Areas */
.scrollable-list {
    flex: 1;
    overflow-y: auto;
    padding-right: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Scrollbars */
.scrollable-list::-webkit-scrollbar {
    width: 4px;
}
.scrollable-list::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.02);
    border-radius: 4px;
}
.scrollable-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}
.scrollable-list::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* List Items */
.list-item {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    padding: 16px 20px;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.list-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.1);
    transform: scale(1.01);
}

.item-title {
    color: #f1f5f9;
    font-weight: 600;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.item-subtitle {
    font-size: 13px;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Badges */
.badge {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.badge-admin {
    color: #fda4af;
    background: rgba(244, 63, 94, 0.1);
    border: 1px solid rgba(244, 63, 94, 0.2);
}

.badge-mod {
    color: #d8b4fe;
    background: rgba(168, 85, 247, 0.1);
    border: 1px solid rgba(168, 85, 247, 0.2);
}

.badge-helper {
    color: #6ee7b7;
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.2);
}

.badge-team {
    color: #94a3b8;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
}

/* Side Player Panel CSS */
.player-panel {
    width: 400px;
    background: rgba(10, 11, 15, 0.7);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-left: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    box-shadow: -20px 0 40px rgba(0,0,0,0.5);
    z-index: 10;
    animation: fadeInUp 0.8s ease-out 0.2s both;
}

.player-panel-header {
    padding: 36px 32px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent);
}

.player-panel-header h2 {
    color: #f8fafc;
    font-size: 24px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#playerCount {
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
}

.player-list-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.player-list-container::-webkit-scrollbar { width: 4px; }
.player-list-container::-webkit-scrollbar-track { background: transparent; }
.player-list-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }

.player-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s ease;
}

.player-card:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateX(-4px);
}

.player-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.player-name {
    color: #f1f5f9;
    font-weight: 600;
    font-size: 15px;
}

.loading {
    color: #64748b;
    text-align: center;
    padding: 40px 0;
    font-size: 14px;
    font-weight: 500;
    animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

/* Responsiveness */
@media (max-width: 1024px) {
    .overlay {
        flex-direction: column;
        overflow-y: auto;
    }
    .main {
        max-height: none;
        padding: 24px;
        overflow-y: visible;
    }
    .player-panel {
        width: 100%;
        height: 600px;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .server-header {
        min-width: 100%;
        padding: 24px;
    }
    .header-badges {
        flex-direction: column;
        gap: 8px;
    }
}
</style>
</head>

<body>

<div class="overlay">

    <div class="main">

        <div class="server-header">
            <div id="serverName">Loading Server...</div>
            <div class="header-badges">
                <div id="joinCode">Join Code: ------</div>
                <div id="playerStats">Loading...</div>
            </div>
        </div>

        <div class="cards-container">
            <div class="glass-panel">
                <h2>Vehicles</h2>
                <div id="vehicleList" class="scrollable-list">
                    <div class="loading">Fetching vehicles data...</div>
                </div>
            </div>

            <div class="glass-panel">
                <h2>Administration</h2>
                <div id="staffList" class="scrollable-list">
                    <div class="loading">Fetching staff data...</div>
                </div>
            </div>
        </div>

    </div>

    <div class="player-panel">
        <div class="player-panel-header">
            <h2>Players <span id="playerCount">0</span></h2>
        </div>
        <div class="player-list-container" id="playerList">
            <div class="loading">Fetching player list...</div>
        </div>
    </div>

</div>

<script>
async function loadServerData() {
    try {
        const [serverResponse, playersResponse, vehiclesResponse, staffResponse] =
            await Promise.all([
                fetch("/api/server").catch(() => null),
                fetch("/api/players").catch(() => null),
                fetch("/api/vehicles").catch(() => null),
                fetch("/api/staff").catch(() => null)
            ]);

        const serverData = serverResponse && serverResponse.ok ? await serverResponse.json() : {};
        const players = playersResponse && playersResponse.ok ? await playersResponse.json() : [];
        const vehicles = vehiclesResponse && vehiclesResponse.ok ? await vehiclesResponse.json() : [];
        const staff = staffResponse && staffResponse.ok ? await staffResponse.json() : {};

        // Update Server Stats
        document.getElementById("serverName").textContent =
            serverData.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (serverData.JoinKey || "N/A");

        document.getElementById("playerStats").textContent =
            `${serverData.CurrentPlayers || 0} / ${serverData.MaxPlayers || 0} Players`;

        document.getElementById("playerCount").textContent = players.length;

        // Update Player List
        const playerList = document.getElementById("playerList");
        playerList.innerHTML = "";

        if(players.length === 0){
            playerList.innerHTML = '<div class="loading">No players online.</div>';
        } else {
            players.forEach(player => {
                const card = document.createElement("div");
                card.className = "player-card";
                card.innerHTML = \`
                    <div class="player-info">
                        <div class="player-name">\${player.Player || "Unknown"}</div>
                    </div>
                    <div class="badge badge-team">\${player.Team || "Civilian"}</div>
                \`;
                playerList.appendChild(card);
            });
        }

        // Update Vehicles List
        const vehicleList = document.getElementById("vehicleList");
        vehicleList.innerHTML = "";

        if(!vehicles || vehicles.length === 0){
            vehicleList.innerHTML = '<div class="loading">No active vehicles.</div>';
        } else {
            vehicles.forEach(veh => {
                const item = document.createElement("div");
                item.className = "list-item";
                item.innerHTML = \`
                    <div class="item-title">\${veh.Name || "Unknown Vehicle"}</div>
                    <div class="item-subtitle">
                        <span style="color: #cbd5e1;">Plate: \${veh.Plate || "N/A"}</span> • 
                        <span>Owner: \${veh.Owner || "Unknown"}</span>
                    </div>
                \`;
                vehicleList.appendChild(item);
            });
        }

        // Update Staff List
        const staffList = document.getElementById("staffList");
        staffList.innerHTML = "";

        const admins = staff?.Staff?.Admins || {};
        const mods = staff?.Staff?.Mods || {};
        const helpers = staff?.Staff?.Helpers || {};

        let hasStaff = false;

        const addStaff = (name, roleClass, roleName, icon) => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "list-item";
            item.innerHTML = \`
                <div class="item-title">
                    <span>\${icon} \${name}</span>
                    <span class="badge \${roleClass}">\${roleName}</span>
                </div>
            \`;
            staffList.appendChild(item);
        };

        Object.values(admins).forEach(admin => addStaff(admin, "badge-admin", "Admin", "👑"));
        Object.values(mods).forEach(mod => addStaff(mod, "badge-mod", "Moderator", "🔨"));
        Object.values(helpers).forEach(helper => addStaff(helper, "badge-helper", "Helper", "⭐"));

        if (!hasStaff) {
            staffList.innerHTML = '<div class="loading">No staff active.</div>';
        }

    } catch(error){
        console.error("Dashboard Update Error:", error);
        document.getElementById("serverName").textContent = "Connection Error";
        document.getElementById("joinCode").textContent = "Check console for details";
    }
}

loadServerData();
setInterval(loadServerData, 5000);
</script>

</body>
</html>
