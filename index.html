<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmberBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Allows navbar at top and content to fill the rest */
            justify-content: center;
            align-items: center;
            background: #0a0a0a; /* Deep black background */
            overflow: hidden;
            position: relative;
        }

        /* Top Navigation Bar Styling */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(18, 18, 18, 0.8); /* Semi-transparent dark gray */
            backdrop-filter: blur(10px); /* Modern blur effect */
            border-bottom: 1px solid rgba(255, 106, 0, 0.2); /* Subtle fiery orange border */
            z-index: 100;
        }

        .nav-left .brand {
            color: #ff6a00; /* Fiery orange title */
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-middle .announcement {
            color: #ffb703; /* Amber/Yellow tone for announcements */
            font-size: 0.95rem;
            background: rgba(255, 183, 3, 0.1);
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 183, 3, 0.2);
        }

        .nav-right .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-right .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .nav-right .nav-links a:hover {
            color: #ff6a00; /* Turns orange on hover */
        }

        /* Container for the content so it stays on top of the waves */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #ffffff; 
            margin-top: 60px; /* Prevents navbar from overlapping text */
        }

        .content h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .content p {
            color: #b3b3b3; /* Subtle light gray for the subtext */
        }

        /* SVG Wave Styling */
        .waves {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15vh;
            min-height: 100px;
            max-height: 150px;
            z-index: 1;
        }

        /* Wave Animation */
        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) {
            animation-delay: -2s;
            animation-duration: 7s;
        }
        .parallax > use:nth-child(2) {
            animation-delay: -3s;
            animation-duration: 10s;
        }
        .parallax > use:nth-child(3) {
            animation-delay: -4s;
            animation-duration: 13s;
        }
        .parallax > use:nth-child(4) {
            animation-delay: -5s;
            animation-duration: 20s;
        }

        @keyframes move-forever {
            0% {
                transform: translate3d(-90px,0,0);
            }
            100% {
                transform: translate3d(85px,0,0);
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
                text-align: center;
            }
            .nav-middle .announcement {
                font-size: 0.8rem;
            }
            .content {
                margin-top: 120px; /* Extra spacing for stacked mobile navbar */
            }
            .waves {
                height: 40px;
                min-height: 40px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="brand">Ember</a>
        </div>
        
        <div class="nav-middle">
            <span class="announcement">📣 We will soon be introducing a new dashboard, exclusive to boosters! 📣</span>
        </div>
        
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="commands.html">Commands</a></li>
            </ul>
        </div>
    </nav>

    <div class="content">
        <h1>Welcome to Ember.</h1>
        <p>Project is under development, check back soon!</p>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            
            <linearGradient id="fireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff6a00" />
                <stop offset="100%" stop-color="#ee0979" />
            </linearGradient>
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="url(#fireGradient)" fill-opacity="0.3" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="url(#fireGradient)" fill-opacity="0.5" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="url(#fireGradient)" fill-opacity="0.7" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="url(#fireGradient)" />
        </g>
    </svg>

</body>
</html>
