<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Updated background with your Discord media link */
            background: #0a0a0a url("https://media.discordapp.net/attachments/1445869801368191100/1497633166528348321/image.png?ex=6a3cac53&is=6a3b5ad3&hm=59cec288768ef6a533a5a2d6b9026734e5b7da8e3e3c196f8fa8929b2d831482&=&format=webp&quality=lossless&width=1331&height=749");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            position: relative;
        }

        /* Top Navigation Bar Styling */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #900c3f; /* Deep fiery red border */
            z-index: 100;
        }

        .nav-left .brand {
            color: #ff6a00;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #ff6a00;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-middle .announcement {
            color: #ffb703;
            font-size: 0.95rem;
            background: rgba(255, 183, 3, 0.1);
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 183, 3, 0.2);
        }

        .nav-right .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-right .nav-links a {
            color: #d0d0d0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-right .nav-links a:hover, 
        .nav-right .nav-links a.active {
            color: #ff6a00;
            text-shadow: 0 0 10px #ff6a00;
        }

        /* Container for the content so it stays on top of the waves */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #ffffff; 
            margin-top: 60px;
            max-width: 600px;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            /* Blue and white gradient text style */
            background: linear-gradient(135deg, #ffffff 30%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
        }

        .content p {
            color: #b3b3b3;
            font-size: 1.2rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* Centered Buttons Styling */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        /* Primary Invite Button Gradient */
        .btn-invite {
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3);
        }

        .btn-invite:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 106, 0, 0.5);
        }

        /* Support Server Button Gradient */
        .btn-support {
            background: linear-gradient(45deg, #b24500, #ff6a00);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(178, 69, 0, 0.3);
        }

        .btn-support:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 106, 0, 0.4);
        }

        /* SVG Wave Styling */
        .waves {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15vh;
            min-height: 100px;
            max-height: 150px;
            z-index: 1;
        }

        /* Wave Animation */
        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) {
            animation-delay: -2s;
            animation-duration: 7s;
        }
        .parallax > use:nth-child(2) {
            animation-delay: -3s;
            animation-duration: 10s;
        }
        .parallax > use:nth-child(3) {
            animation-delay: -4s;
            animation-duration: 13s;
        }
        .parallax > use:nth-child(4) {
            animation-delay: -5s;
            animation-duration: 20s;
        }

        @keyframes move-forever {
            0% {
                transform: translate3d(-90px,0,0);
            }
            100% {
                transform: translate3d(85px,0,0);
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
                text-align: center;
            }
            .nav-middle .announcement {
                font-size: 0.8rem;
            }
            .content {
                margin-top: 160px;
            }
            .content h1 {
                font-size: 2.5rem;
            }
            .button-group {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
            .btn {
                width: 100%;
                max-width: 250px;
            }
            .waves {
                height: 60px;
                min-height: 60px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand">Ember</a>
        </div>
        
        <div class="nav-middle">
            <span class="announcement">Join our Discord!</span>
        </div>
        
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="commands.html">Commands</a></li>
            </ul>
        </div>
    </nav>

    <div class="content">
        <h1>New York City Roleplay</h1>
        <p>Do not share any information.</p>
        
        <div class="button-group">
            <a href="https://erlc.gg/join/playnyrp" class="btn btn-invite">Join Server</a>
            <a href="https://melon.ly/join/RWZELM" class="btn btn-support">Join Melonly</a>
        </div>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            
            <linearGradient id="fireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff6a00" />
                <stop offset="100%" stop-color="#ee0979" />
            </linearGradient>
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="url(#fireGradient)" fill-opacity="0.3" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="url(#fireGradient)" fill-opacity="0.5" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="url(#fireGradient)" fill-opacity="0.7" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="url(#fireGradient)" />
        </g>
    </svg>

</body>
</html>
