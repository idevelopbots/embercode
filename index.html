<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Angeles Management</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fullscreen background */
        .bg-background {
            width: 100%;
            height: 100vh;

            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* Logo */
        .top-right-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            object-fit: contain;
            z-index: 10;
        }

        /* Blurred text container */
        .hero-text {
            text-align: center;
            max-width: 850px;
            padding: 30px 40px;

            background: rgba(255, 255, 255, 0.05);

            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);

            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .hero-text h1 {
            font-size: 4rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;

            text-shadow:
                0 0 8px rgba(255,255,255,0.5),
                0 0 20px rgba(255,255,255,0.25),
                -1px -1px 0 #000,
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
        }

        .hero-text p {
            font-size: 1.3rem;
            color: white;
            line-height: 1.6;

            text-shadow:
                -1px -1px 0 #000,
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .hero-text {
                width: 90%;
                padding: 25px;
            }

            .hero-text h1 {
                font-size: 2.5rem;
            }

            .hero-text p {
                font-size: 1rem;
            }

            .top-right-logo {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-background">

        <!-- Logo -->
        <img
            class="top-right-logo"
            src="https://media.discordapp.net/attachments/1524884039184679092/1524913925911482388/7c8b57e10015b77642067173e7460e4b.png?ex=6a517a43&is=6a5028c3&hm=bb0fad28473c42ba4b64f6f4b912b048d7616cbdcf6eedbe50ebc720fb8c7117&="
            alt="Logo"
        >

        <!-- Main Text -->
        <div class="hero-text">
            <h1>Welcome to My Page</h1>

            <p>
                This is a starter template using your requested image as a
                full-screen background. You can replace this text and build
                your project right inside this page.
            </p>
        </div>

    </div>

</body>
</html>
