<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Moderation Panel</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#111318;
    color:white;
    display:flex;
    height:100vh;

}


/* Sidebar */

.sidebar{

    width:240px;
    background:#1c2028;
    padding:25px;

}


.sidebar h2{

    text-align:center;
    margin-bottom:30px;

}



.sidebar button{

    width:100%;
    padding:13px;

    margin-bottom:12px;

    background:#2d333d;
    color:white;

    border:none;
    border-radius:8px;

    cursor:pointer;

}



.sidebar button:hover{

    background:#3b82f6;

}





/* Main */

.main{

    flex:1;
    padding:40px;

}




.card{

    background:#1c2028;

    padding:30px;

    border-radius:12px;

    width:600px;

}




h1{

    margin-bottom:25px;

}





label{

    display:block;

    margin-top:15px;

    margin-bottom:6px;

    font-weight:bold;

}





input,
select,
textarea{


    width:100%;

    padding:12px;

    background:#2d333d;

    color:white;

    border:none;

    border-radius:8px;


}



textarea{

    height:100px;

    resize:none;

}





.execute{

    width:100%;

    padding:14px;

    margin-top:20px;


    background:#3b82f6;

    color:white;


    border:none;

    border-radius:8px;

    cursor:pointer;


}




.execute:hover{

    background:#2563eb;

}





.hidden{

    display:none;

}





#status{

    margin-top:15px;

    color:#6ee7b7;

    text-align:center;

}





/* Tables */


table{

    width:100%;

    margin-top:20px;

    border-collapse:collapse;


}



th,
td{

    padding:10px;

    border-bottom:1px solid #333;

    text-align:left;

}



</style>


</head>


<body>





<div class="sidebar">


<h2>
Admin Panel
</h2>



<button onclick="openPage('moderation')">

Moderation

</button>




<button onclick="openPage('history')">

Ban History

</button>





<button onclick="openPage('logs')">

Logs

</button>



</div>









<div class="main">





<!-- MODERATION PAGE -->


<div id="moderation">


<div class="card">



<h1>
Moderation
</h1>






<label>
Target Type
</label>


<select id="targetType">


<option value="username">
Username
</option>


<option value="userid">
User ID
</option>


</select>







<label>
Target
</label>


<input 
id="target"
placeholder="Username or User ID">







<label>
Action
</label>


<select id="action" onchange="updateDurations()">



<option value="kick">
Kick
</option>



<option value="ban">
Ban
</option>


</select>








<label>
Duration
</label>


<select id="duration">

</select>








<label>
Reason
</label>


<textarea 
id="reason"
placeholder="Reason for action">
</textarea>









<button class="execute" onclick="sendCommand()">

Execute

</button>






<p id="status"></p>





</div>


</div>









<!-- BAN HISTORY PAGE -->


<div id="history" class="hidden">


<div class="card">


<h1>
Ban History
</h1>



<table id="historyTable">


<tr>

<th>
User
</th>


<th>
Duration
</th>


<th>
Reason
</th>


</tr>


</table>



</div>


</div>









<!-- LOGS PAGE -->


<div id="logs" class="hidden">


<div class="card">


<h1>
Logs
</h1>



<table id="logsTable">


<tr>

<th>
Action
</th>


<th>
User
</th>


<th>
Date
</th>


</tr>


</table>




</div>


</div>





</div>

<script>
/*
FIREBASE REALTIME DATABASE CONFIG

This is your logging database:
https://moderationpanel-86889-default-rtdb.firebaseio.com/
*/

const FIREBASE_DATABASE = "https://moderationpanel-86889-default-rtdb.firebaseio.com";
const COMMAND_LOCATION = "/commands.json";
const LOG_LOCATION = "/logs.json";
const HISTORY_LOCATION = "/banHistory.json";

function openPage(page) {
  document.querySelectorAll(".main > div").forEach(section => {
    section.classList.add("hidden");
  });

  document.getElementById(page).classList.remove("hidden");

  if (page === "logs") {
    loadLogs();
  }

  if (page === "history") {
    loadHistory();
  }
}

function updateDurations() {
  const action = document.getElementById("action").value;
  const duration = document.getElementById("duration");
  duration.innerHTML = "";

  if (action === "kick") {
    duration.innerHTML = `
      <option value="30">30 Minutes</option>
      <option value="60">1 Hour</option>
      <option value="120">2 Hours</option>
      <option value="360">6 Hours</option>
      <option value="720">12 Hours</option>
      <option value="1440">1 Day</option>
    `;
  } else {
    duration.innerHTML = `
      <option value="1440">1 Day</option>
      <option value="4320">3 Days</option>
      <option value="10080">1 Week</option>
      <option value="43200">1 Month</option>
      <option value="permanent">Permanent</option>
    `;
}

async function sendCommand() {

  const createdAt = Date.now();

  const durationMinutes =
    Number(document.getElementById("duration").value);


  const command = {

    targetType:
    document.getElementById("targetType").value,


    target:
    document.getElementById("target").value,


    action:
    document.getElementById("action").value,


    // Stored as minutes
    duration:
    durationMinutes,


    // UTC timestamp in milliseconds
    createdAt:
    createdAt,


    // Exact time the action expires
    expiresAt:
    createdAt + (durationMinutes * 60 * 1000),


    reason:
    document.getElementById("reason").value

  };



  await fetch(FIREBASE_DATABASE + COMMAND_LOCATION, {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:
    JSON.stringify(command)

  });



  await fetch(FIREBASE_DATABASE + LOG_LOCATION, {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:
    JSON.stringify({

      action:
      command.action,

      target:
      command.target,

      reason:
      command.reason,

      createdAt:
      createdAt

    })

  });



  if(command.action === "ban") {

    await fetch(FIREBASE_DATABASE + HISTORY_LOCATION, {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:
      JSON.stringify(command)

    });

  }



  document.getElementById("status").innerText =
  "Command sent to Roblox system.";

}

async function loadLogs() {
  const response = await fetch(FIREBASE_DATABASE + LOG_LOCATION);
  const logs = await response.json();
  const table = document.getElementById("logsTable");
  table.innerHTML = `<tr><th>Action</th><th>User</th><th>Date</th></tr>`;

  if (logs) {
    Object.values(logs).reverse().forEach(log => {
      table.innerHTML += `<tr><td>${log.action}</td><td>${log.target}</td><td>${new Date(log.createdAt).toLocaleString()}</td></tr>`;
    });
  }
}

async function loadHistory() {
  const response = await fetch(FIREBASE_DATABASE + HISTORY_LOCATION);
  const history = await response.json();
  const table = document.getElementById("historyTable");
  table.innerHTML = `<tr><th>User</th><th>Duration</th><th>Reason</th></tr>`;

  if (history) {
    Object.values(history).reverse().forEach(ban => {
      table.innerHTML += `<tr><td>${ban.target}</td><td>${ban.duration}</td><td>${ban.reason}</td></tr>`;
    });
  }
}

updateDurations();
</script>
</body>
</html>
