<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Component</title>
    <style>
        /* Base page styling to match the screenshot */
        body {
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            color: #ffffff;
        }

        /* The main outer container widget */
        .logging-widget {
            background-color: #0f0f0f;
            border: 1px solid #241911; /* Subtle dark orange/brown border tint */
            border-radius: 12px;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header row layout */
        .widget-header {
            margin-bottom: 24px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        /* Orange document icon placeholder */
        .icon-orange {
            color: #ff6b1a;
            font-size: 24px;
            font-weight: bold;
        }

        .widget-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }

        /* BETA badge styling */
        .beta-badge {
            background-color: rgba(255, 107, 26, 0.15);
            color: #ff6b1a;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .widget-subtitle {
            color: #8c8c8c;
            font-size: 14px;
        }

        /* Two-column grid for the interactive cards */
        .card-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Card styling */
        .log-card {
            background-color: #141414;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Hover effect for interactivity */
        .log-card:hover {
            border-color: #ff6b1a;
            background-color: #1a1a1a;
        }

        .card-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-icon {
            font-size: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .card-description {
            color: #666666;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="logging-widget">
        
        <div class="widget-header">
            <div class="title-row">
                <span class="icon-orange">📄</span>
                <span class="widget-title">Logging</span>
                <span class="beta-badge">Beta</span>
            </div>
            <div class="widget-subtitle">
                Log briefings and priorities to track staff activities
            </div>
        </div>

        <div class="card-row">
            
            <div class="log-card">
                <div class="card-title-row">
                    <span class="card-icon">📄</span>
                    <span class="card-title">Log Briefing</span>
                </div>
                <div class="card-description">
                    Record staff briefings and meetings
                </div>
            </div>

            <div class="log-card">
                <div class="card-title-row">
                    <span class="card-icon" style="color: #ff6b1a;">⚠️</span>
                    <span class="card-title">Log Priority</span>
                </div>
                <div class="card-description">
                    Record priority incidents and events
                </div>
            </div>

        </div>
    </div>

</body>
</html>
