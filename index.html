<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal</title>
    <style>
        /* Reset margins and ensure full height */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fullscreen background styling */
        .bg-background {
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* Center the content container vertically and horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Translucent card to make text readable over the background */
        .content-card {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo positioned inside the card at the top center */
        .center-top-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 2rem;
        }

        p {
            color: #666;
            line-height: 1.6;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="bg-background">
        <div class="content-card">
            <img class="center-top-logo" src="https://media.discordapp.net/attachments/1524884039184679092/1524913925911482388/7c8b57e10015b77642067173e7460e4b.png?ex=6a517a43&is=6a5028c3&hm=bb0fad28473c42ba4b64f6f4b912b048d7616cbdcf6eedbe50ebc720fb8c7117&=" alt="Logo">
            
            <h1>Los Angeles</h1>
            
            <p>Management Portal</p>
        </div>
    </div>

</body>
</html>
