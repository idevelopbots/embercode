<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Angeles Roleplay Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #090a0f;
    /* Added your background image properties here */
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.overlay {
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    background: rgba(9, 10, 15, 0.4); /* Subtle overlay to make cards pop more */
}

.main {
    flex: 1;
    position: relative;
    padding: 30px;
    display: flex;
    flex-direction: column;
}

.server-header {
    margin: 0 auto 30px auto;
    text-align: center;
    background: rgba(15, 17, 23, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 20px 40px;
    min-width: 450px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

#serverName {
    color: white;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

#joinCode {
    color: #a0aec0;
    font-size: 14px;
    margin-top: 6px;
    font-family: 'Courier New', Courier, monospace;
    background: rgba(255, 255, 255, 0.05);
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
}

#playerStats {
    color: #9ecfff;
    margin-top: 10px;
    font-weight: 600;
    font-size: 15px;
}

/* Flex layout to align cards cleanly side-by-side in the middle */
.cards-container {
    display: flex;
    gap: 25px;
    flex: 1;
    align-items: flex-start;
}

/* Base style shared across dashboard panels */
.plate-card, .staff-card {
    width: 360px;
    background: rgba(15, 17, 23, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    max-height: 75vh;
}

.plate-card h2, .staff-card h2 {
    color: white;
    margin-bottom: 18px;
    font-size: 20px;
    font-weight: 600;
}

#vehicleList, #staffList {
    flex: 1;
    overflow-y: auto;
    padding-right: 5px;
}

/* Custom Scrollbars */
#vehicleList::-webkit-scrollbar,
#staffList::-webkit-scrollbar,
.player-list::-webkit-scrollbar {
    width: 6px;
}
#vehicleList::-webkit-scrollbar-track,
#staffList::-webkit-scrollbar-track,
.player-list::-webkit-scrollbar-track {
    background: transparent;
}
#vehicleList::-webkit-scrollbar-thumb,
#staffList::-webkit-scrollbar-thumb,
.player-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
}
#vehicleList::-webkit-scrollbar-thumb:hover,
#staffList::-webkit-scrollbar-thumb:hover,
.player-list::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

.vehicle-item, .staff-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    color: white;
}

.vehicle-owner, .staff-role {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
}

.staff-role {
    color: #ff9e9e;
    background: rgba(255, 158, 158, 0.08);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
}

/* Player Panel Sidebar */
.player-panel {
    width: 380px;
    background: rgba(10, 12, 18, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    box-shadow: -5px 0 25px rgba(0,0,0,0.3);
}

.player-panel-header {
    padding: 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.player-panel-header h2 {
    color: white;
    font-size: 22px;
    font-weight: 600;
}

#playerCount {
    color: #94a3b8;
    margin-top: 6px;
    font-size: 14px;
    font-weight: 500;
}

.player-list {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.player-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    transition: transform 0.2s ease, background 0.2s ease;
}

.player-card:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateY(-1px);
}

.player-name {
    color: white;
    font-weight: 600;
    font-size: 15px;
}

.player-team {
    color: #94a3b8;
    margin-top: 4px;
    font-size: 13px;
    display: inline-block;
    background: rgba(255, 255, 255, 0.05);
    padding: 2px 8px;
    border-radius: 4px;
}

.loading {
    color: #94a3b8;
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
    font-style: italic;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="main">

        <div class="server-header">
            <div id="serverName">Loading Server...</div>
            <div id="joinCode">Join Code: ------</div>
            <div id="playerStats">Loading...</div>
        </div>

        <div class="cards-container">
            <div class="plate-card">
                <h2>Vehicles</h2>
                <div id="vehicleList">
                    <div class="loading">Loading vehicles...</div>
                </div>
            </div>

            <div class="staff-card">
                <h2>Server Administration</h2>
                <div id="staffList">
                    <div class="loading">Loading staff...</div>
                </div>
            </div>
        </div>

    </div>

    <div class="player-panel">

        <div class="player-panel-header">
            <h2>Players</h2>
            <div id="playerCount">Loading...</div>
        </div>

        <div class="player-list" id="playerList">
            <div class="loading">Loading players...</div>
        </div>

    </div>

</div>

<script>
async function loadServerData() {
    try {
        const [serverResponse, playersResponse, vehiclesResponse, staffResponse] =
            await Promise.all([
                fetch("/api/server"),
                fetch("/api/players"),
                fetch("/api/vehicles"),
                fetch("/api/staff")
            ]);

        const serverData = await serverResponse.json();
        const players = await playersResponse.json();
        const vehicles = await vehiclesResponse.json();
        const staff = await staffResponse.json();

        // Update Server Stats
        document.getElementById("serverName").textContent =
            serverData.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (serverData.JoinKey || "N/A");

        document.getElementById("playerStats").textContent =
            `${serverData.CurrentPlayers || 0}/${serverData.MaxPlayers || 0} Players`;

        document.getElementById("playerCount").textContent =
            `${players.length} Players Online`;

        // Update Player List
        const playerList = document.getElementById("playerList");
        playerList.innerHTML = "";

        if(players.length === 0){
            playerList.innerHTML = '<div class="loading">No players online.</div>';
        } else {
            players.forEach(player => {
                const card = document.createElement("div");
                card.className = "player-card";
                card.innerHTML = `
                    <div class="player-name">${player.Player || "Unknown"}</div>
                    <div class="player-team">${player.Team || "Civilian"}</div>
                `;
                playerList.appendChild(card);
            });
        }

        // Update Vehicles List
        const vehicleList = document.getElementById("vehicleList");
        vehicleList.innerHTML = "";

        if(!vehicles || vehicles.length === 0){
            vehicleList.innerHTML = '<div class="loading">No active vehicles.</div>';
        } else {
            vehicles.forEach(veh => {
                const item = document.createElement("div");
                item.className = "vehicle-item";
                item.innerHTML = `
                    <strong>${veh.Name || "Unknown Vehicle"}</strong>
                    <div class="vehicle-owner">Plate: ${veh.Plate || "N/A"} • Owner: ${veh.Owner || "Unknown"}</div>
                `;
                vehicleList.appendChild(item);
            });
        }

        // Update Staff List
        const staffList = document.getElementById("staffList");
        staffList.innerHTML = "";

        const admins = staff?.Staff?.Admins || {};
        const mods = staff?.Staff?.Mods || {};
        const helpers = staff?.Staff?.Helpers || {};

        let hasStaff = false;

        Object.values(admins).forEach(admin => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "staff-item";
            item.innerHTML = `
                <strong>👑 ${admin}</strong>
                <div>
                    <span class="staff-role">Administrator</span>
                </div>
            `;
            staffList.appendChild(item);
        });

        Object.values(mods).forEach(mod => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "staff-item";
            item.innerHTML = `
                <strong>🔨 ${mod}</strong>
                <div>
                    <span class="staff-role">Moderator</span>
                </div>
            `;
            staffList.appendChild(item);
        });

        Object.values(helpers).forEach(helper => {
            hasStaff = true;
            const item = document.createElement("div");
            item.className = "staff-item";
            item.innerHTML = `
                <strong>⭐ ${helper}</strong>
                <div>
                    <span class="staff-role">Helper</span>
                </div>
            `;
            staffList.appendChild(item);
        });

        if (!hasStaff) {
            staffList.innerHTML = '<div class="loading">No staff active.</div>';
        }

    } catch(error){
        console.error(error);
        document.getElementById("serverName").textContent = "Connection Failed";
        document.getElementById("joinCode").textContent = "Unable to contact API";
    }
}

loadServerData();
setInterval(loadServerData, 5000);
</script>

</body>
</html>
