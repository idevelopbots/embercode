<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Angeles Portal — SHR Exclusive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #eef1f5;
    --ink-dim: #9aa4b2;
    --ink-faint: #6b7382;
    --panel: rgba(18, 22, 30, 0.72);
    --panel-border: rgba(255, 255, 255, 0.08);
    --gold: #d4af37;
    --red: #c1272d;
    --blue: #3d6fb4;
    --green: #4caf6e;
    --bg-black-1: rgba(6, 8, 12, 0.86);
    --bg-black-2: rgba(6, 8, 12, 0.94);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    position: relative;
  }

  /* ---- background image + black covering ---- */
  .bg-image {
    position: fixed;
    inset: -20px;
    z-index: -2;
    background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    background-attachment: fixed;
    filter: blur(6px) saturate(0.7) contrast(1.02);
    transform: scale(1.05);
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg, rgba(6,8,12,0.78) 0%, rgba(6,8,12,0.88) 55%, rgba(6,8,12,0.78) 100%);
  }

  /* subtle scanline / dispatch texture removed per request */

  /* ---- top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 5vw;
    border-bottom: 1px solid var(--panel-border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ---- hero ---- */
  .hero {
    text-align: center;
    padding: 7rem 5vw 4rem;
    position: relative;
  }

  .hero .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.4rem;
  }

  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(2.6rem, 7vw, 5.2rem);
    letter-spacing: 0.01em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--ink);
    text-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }

  .hero .subtitle {
    margin-top: 1rem;
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
  }

  .hero .subtitle strong {
    color: var(--gold);
    font-weight: 500;
  }

  .hero .divider {
    width: 70%;
    max-width: 70%;
    height: 1px;
    background: rgba(255, 255, 255, 0.18);
    margin: 1.8rem auto 0;
  }

  /* ---- dashboard grid ---- */
  .dashboard {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 5vw 5rem;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: minmax(180px, 220px);
    gap: 1rem;
    margin: 0 auto 2.4rem;
    justify-content: center;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 1.4rem 1.5rem;
    backdrop-filter: blur(6px);
    text-align: center;
  }

  .stat-card .label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-card .value {
    font-family: 'Oswald', sans-serif;
    font-size: 1.9rem;
    font-weight: 500;
    color: var(--ink);
  }

  .stat-card .value.status-online { color: var(--green); }
  .stat-card .value.status-red { color: var(--red); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1.4rem;
    backdrop-filter: blur(6px);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--panel-border);
  }

  .panel-header h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .panel-header .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  /* ---- ERLC command board (Jeopardy layout) ---- */
  .board-body {
    padding: 1.4rem 1.5rem 1.6rem;
  }

  .jeopardy-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .board-category {
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 4px;
    padding: 0.8rem 0.6rem;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .board-card {
    background: rgba(61, 111, 180, 0.16);
    border: 1px solid rgba(61, 111, 180, 0.4);
    border-radius: 4px;
    padding: 1.1rem 0.6rem;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
  }

  .board-card:hover {
    background: rgba(61, 111, 180, 0.32);
    border-color: var(--blue);
    transform: translateY(-1px);
  }

  .board-card:active {
    transform: translateY(0);
  }

  .board-card.sending {
    opacity: 0.5;
    cursor: wait;
    pointer-events: none;
  }

  .board-card.danger:hover {
    background: rgba(193, 39, 45, 0.2);
    border-color: var(--red);
  }

  .command-status {
    margin-top: 1.2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink-faint);
  }

  .command-status.ok { color: var(--green); }
  .command-status.error { color: var(--red); }

  .hidden { display: none !important; }

  @media (max-width: 640px) {
    .jeopardy-board { grid-template-columns: repeat(2, 1fr); }
  }

  footer {
    text-align: center;
    padding: 2rem 5vw;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-faint);
    border-top: 1px solid var(--panel-border);
  }

  @media (max-width: 800px) {
    .stat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="topbar">
    <div class="brand">
      Los Angeles Management
    </div>
  </div>

  <section class="hero">
    <div class="eyebrow">ER:LC · Community Server</div>
    <h1>Los Angeles Portal</h1>
    <div class="subtitle"><strong>SHR</strong> Exclusive</div>
    <div class="divider"></div>
  </section>

  <div class="dashboard">

    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Players</div>
        <div class="value" id="playerCount">— / —</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>ERLC Command Board</h2>
        <span class="tag">Live · Executes via API</span>
      </div>
      <div class="board-body">
        <div id="commandBoard" class="jeopardy-board"></div>
        <div id="commandStatus" class="command-status">Select a command tile to run it on your server.</div>
      </div>
    </div>


  </div>

  <footer>
    LOS ANGELES PORTAL · SHR EXCLUSIVE COMMUNITY · NOT AFFILIATED WITH ER:LC OR ROBLOX CORPORATION
  </footer>

  <script>
    // ---------------------------------------------------------------
    // ⚠️ SECURITY NOTE: this key is visible to anyone who views this
    // page's source (browser devtools > Sources/Network). PRC's own
    // docs warn that a leaked server key can be used to attack/raid
    // your server — and this key can also RUN COMMANDS on your server
    // (kick, ban, announce, etc.), so exposure here is higher-stakes
    // than the read-only player count. Fine for local testing; for a
    // real deployment, route both of these through a small backend/
    // proxy that holds the key server-side instead of embedding it.
    // ---------------------------------------------------------------
    const ERLC_SERVER_KEY = 'uupNgrOZhpdCgwStivKZ-WiDezheWTtqIXLQIlLmoICWddCjlpumqMyjkJfaJ';
    const ERLC_BASE = 'https://api.erlc.gg/v2/server';

    // --- Live player count ---
    const playerCountEl = document.getElementById('playerCount');

    async function fetchServerStatus() {
      try {
        const res = await fetch(ERLC_BASE, {
          headers: { 'server-key': ERLC_SERVER_KEY }
        });

        if (!res.ok) throw new Error(`API responded ${res.status}`);

        const data = await res.json();
        playerCountEl.textContent = `${data.CurrentPlayers} / ${data.MaxPlayers}`;
      } catch (err) {
        console.error('ER:LC status fetch failed:', err);
        playerCountEl.textContent = 'Offline';
      }
    }

    fetchServerStatus();
    setInterval(fetchServerStatus, 30000); // refresh every 30s

    // ---------------------------------------------------------------
    // ERLC COMMAND BOARD — Jeopardy-style grid, executes real commands
    // via POST https://api.erlc.gg/v2/server/command
    // ---------------------------------------------------------------
    const COMMAND_BOARD = [
      {
        category: 'Announcements',
        commands: [
          { label: 'Send Hint', promptText: 'Hint text (shown briefly on screen):', build: v => `:h ${v}` },
          { label: 'Send Message', promptText: 'Message text (persistent banner):', build: v => `:m ${v}` },
          { label: 'Announce', promptText: 'Announcement text:', build: v => `:announce ${v}` },
          { label: 'PM Player', promptText: 'Format: PlayerName Message', build: v => `:pm ${v}` }
        ]
      },
      {
        category: 'Weather',
        commands: [
          { label: 'Clear', build: () => ':weather clear' },
          { label: 'Rain', build: () => ':weather rain' },
          { label: 'Fog', build: () => ':weather fog' },
          { label: 'Snow', build: () => ':weather snow' }
        ]
      },
      {
        category: 'Time',
        commands: [
          { label: 'Day', build: () => ':time 12' },
          { label: 'Dusk', build: () => ':time 18' },
          { label: 'Night', build: () => ':time 0' },
          { label: 'Dawn', build: () => ':time 6' }
        ]
      },
      {
        category: 'Player Actions',
        commands: [
          { label: 'Bring', promptText: 'Player name to bring:', build: v => `:bring ${v}` },
          { label: 'Kick', promptText: 'Player name to kick:', danger: true, build: v => `:kick ${v}` },
          { label: 'Ban', promptText: 'Player name to ban:', danger: true, build: v => `:ban ${v}` },
          { label: 'Unban', promptText: 'Player name to unban:', build: v => `:unban ${v}` }
        ]
      }
    ];

    const boardEl = document.getElementById('commandBoard');
    const statusEl = document.getElementById('commandStatus');
    const rowCount = Math.max(...COMMAND_BOARD.map(c => c.commands.length));

    // Header row — category names
    COMMAND_BOARD.forEach(cat => {
      const header = document.createElement('div');
      header.className = 'board-category';
      header.textContent = cat.category;
      boardEl.appendChild(header);
    });

    // Card rows, aligned under their category column
    for (let row = 0; row < rowCount; row++) {
      COMMAND_BOARD.forEach(cat => {
        const cmd = cat.commands[row];
        const card = document.createElement('div');
        card.className = 'board-card' + (cmd && cmd.danger ? ' danger' : '');
        card.textContent = cmd ? cmd.label : '';
        if (cmd) card.addEventListener('click', () => handleCardClick(card, cmd));
        boardEl.appendChild(card);
      });
    }

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = 'command-status' + (type ? ' ' + type : '');
    }

    async function handleCardClick(card, cmd) {
      let value = '';
      if (cmd.promptText) {
        value = window.prompt(cmd.promptText);
        if (value === null || value.trim() === '') return; // cancelled or empty
      }
      if (cmd.danger) {
        const ok = window.confirm(`Run "${cmd.build(value)}" on your server?`);
        if (!ok) return;
      }

      const commandString = cmd.build(value);
      card.classList.add('sending');
      setStatus(`Sending: ${commandString}…`);

      try {
        const res = await fetch(`${ERLC_BASE}/command`, {
          method: 'POST',
          headers: {
            'server-key': ERLC_SERVER_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ command: commandString })
        });

        if (!res.ok) throw new Error(`API responded ${res.status}`);
        setStatus(`✓ Sent: ${commandString}`, 'ok');
      } catch (err) {
        console.error('ER:LC command failed:', err);
        setStatus(`✗ Failed to send "${commandString}" — ${err.message}`, 'error');
      } finally {
        card.classList.remove('sending');
      }
    }
  </script>

</body>
</html>
