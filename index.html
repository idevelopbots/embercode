<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Angeles Roleplay Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #090a0f;
    background-image: radial-gradient(circle at 10% 20%, rgba(14, 99, 156, 0.15) 0%, transparent 45%),
                      radial-gradient(circle at 90% 80%, rgba(158, 207, 255, 0.08) 0%, transparent 50%);
}

.overlay {
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
}

.main {
    flex: 1;
    position: relative;
    padding: 30px;
    display: flex;
    flex-direction: column;
}

.server-header {
    margin: 0 auto 30px auto;
    text-align: center;
    background: rgba(15, 17, 23, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 20px 40px;
    min-width: 450px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

#serverName {
    color: white;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

#joinCode {
    color: #a0aec0;
    font-size: 14px;
    margin-top: 6px;
    font-family: 'Courier New', Courier, monospace;
    background: rgba(255, 255, 255, 0.05);
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
}

#playerStats {
    color: #9ecfff;
    margin-top: 10px;
    font-weight: 600;
    font-size: 15px;
}

/* Plate / Vehicle Card */
.plate-card {
    width: 360px;
    background: rgba(15, 17, 23, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    max-height: 70vh;
}

.plate-card h2 {
    color: white;
    margin-bottom: 18px;
    font-size: 20px;
    font-weight: 600;
}

#vehicleList {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 15px;
    padding-right: 5px;
}

/* Custom Scrollbars */
#vehicleList::-webkit-scrollbar,
.player-list::-webkit-scrollbar {
    width: 6px;
}
#vehicleList::-webkit-scrollbar-track,
.player-list::-webkit-scrollbar-track {
    background: transparent;
}
#vehicleList::-webkit-scrollbar-thumb,
.player-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
}
#vehicleList::-webkit-scrollbar-thumb:hover,
.player-list::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Reusing player card styling tokens cleanly for generated vehicles if needed */
.vehicle-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    color: white;
}

.vehicle-owner {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
}

#plateSearch {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    outline: none;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    margin-bottom: 12px;
    font-size: 15px;
    transition: all 0.2s ease;
}

#plateSearch:focus {
    background: rgba(255, 255, 255, 0.08);
    border-color: #0e639c;
    box-shadow: 0 0 0 3px rgba(14, 99, 156, 0.3);
}

#searchPlate {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #0e639c;
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
}

#searchPlate:hover {
    background: #1177bb;
}

#searchPlate:active {
    transform: scale(0.98);
}

#plateResult {
    color: #cbd5e1;
    margin-top: 15px;
    font-size: 14px;
    line-height: 1.5;
    background: rgba(0, 0, 0, 0.2);
    padding: 12px;
    border-radius: 8px;
    border-left: 3px solid #0e639c;
}

/* Player Panel Sidebar */
.player-panel {
    width: 380px;
    background: rgba(10, 12, 18, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    box-shadow: -5px 0 25px rgba(0,0,0,0.3);
}

.player-panel-header {
    padding: 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.player-panel-header h2 {
    color: white;
    font-size: 22px;
    font-weight: 600;
}

#playerCount {
    color: #94a3b8;
    margin-top: 6px;
    font-size: 14px;
    font-weight: 500;
}

.player-list {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.player-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    transition: transform 0.2s ease, background 0.2s ease;
}

.player-card:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateY(-1px);
}

.player-name {
    color: white;
    font-weight: 600;
    font-size: 15px;
}

.player-team {
    color: #94a3b8;
    margin-top: 4px;
    font-size: 13px;
    display: inline-block;
    background: rgba(255, 255, 255, 0.05);
    padding: 2px 8px;
    border-radius: 4px;
}

.loading {
    color: #94a3b8;
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
    font-style: italic;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="main">

        <div class="server-header">
            <div id="serverName">Loading Server...</div>
            <div id="joinCode">Join Code: ------</div>
            <div id="playerStats">Loading...</div>
        </div>

        <div class="plate-card">
            <h2>Vehicles</h2>
            <div id="vehicleList">
                <div class="loading">Loading vehicles...</div>
            </div>
            <input type="text" id="plateSearch" placeholder="Enter License Plate...">
            <button id="searchPlate">Search Plate</button>
            <div id="plateResult"></div>
        </div>

    </div>

    <div class="player-panel">

        <div class="player-panel-header">
            <h2>Players</h2>
            <div id="playerCount">Loading...</div>
        </div>

        <div class="player-list" id="playerList">
            <div class="loading">Loading players...</div>
        </div>

    </div>

</div>

<script>
async function loadServerData() {
    try {
        const [serverResponse, playersResponse, vehiclesResponse] =
            await Promise.all([
                fetch("/api/server"),
                fetch("/api/players"),
                fetch("/api/vehicles")
            ]);

        const serverData = await serverResponse.json();
        const players = await playersResponse.json();
        const vehicles = await vehiclesResponse.json();

        // Update Server Stats
        document.getElementById("serverName").textContent =
            serverData.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (serverData.JoinKey || "N/A");

        document.getElementById("playerStats").textContent =
            `${serverData.CurrentPlayers || 0}/${serverData.MaxPlayers || 0} Players`;

        document.getElementById("playerCount").textContent =
            `${players.length} Players Online`;

        // Update Player List
        const playerList = document.getElementById("playerList");
        playerList.innerHTML = "";

        if(players.length === 0){
            playerList.innerHTML = '<div class="loading">No players online.</div>';
        } else {
            players.forEach(player => {
                const card = document.createElement("div");
                card.className = "player-card";
                card.innerHTML = `
                    <div class="player-name">${player.Player || "Unknown"}</div>
                    <div class="player-team">${player.Team || "Civilian"}</div>
                `;
                playerList.appendChild(card);
            });
        }

        // Update Vehicles List
        const vehicleList = document.getElementById("vehicleList");
        vehicleList.innerHTML = "";

        if(!vehicles || vehicles.length === 0){
            vehicleList.innerHTML = '<div class="loading">No active vehicles.</div>';
        } else {
            vehicles.forEach(veh => {
                const item = document.createElement("div");
                item.className = "vehicle-item";
                item.innerHTML = `
                    <strong>${veh.Name || "Unknown Vehicle"}</strong>
                    <div class="vehicle-owner">Plate: ${veh.LicensePlate || "N/A"} • Owner: ${veh.Owner || "Unknown"}</div>
                `;
                vehicleList.appendChild(item);
            });
        }

    } catch(error){
        console.error(error);
        document.getElementById("serverName").textContent = "Connection Failed";
        document.getElementById("joinCode").textContent = "Unable to contact API";
    }
}

document.getElementById("searchPlate").addEventListener("click", () => {
    const plate = document.getElementById("plateSearch").value;
    document.getElementById("plateResult").innerHTML = `
        <strong>Searched Plate:</strong> ${plate}<br>
        Vehicle lookup not connected yet.
    `;
});

loadServerData();
setInterval(loadServerData, 5000);
</script>

</body>
</html>
