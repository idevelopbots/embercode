<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MochiBot | Discord Assistant</title>
  <style>
    /* Color Palette: Soft Mochi Aesthetics */
    :root {
      --bg-color: #fdfbf7;        /* Creamy Mochi White */
      --nav-bg: #ffffff;          /* Pure White */
      --strawberry: #ffb7b2;      /* Soft Pink */
      --taro: #e2f0cb;            /* Soft Matcha Green */
      --lavender: #c7ceea;        /* Soft Lavender */
      --text-dark: #4a4a4a;       /* Charcoal Gray */
      --text-light: #7a7a7a;      /* Muted Gray */
      --card-bg: #ffffff;
      --accent: #d87093;          /* Soft Rose */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top Navigation Bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 8%;
      background-color: var(--nav-bg);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-light);
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    /* Page Container Management */
    .page {
      display: none;
      flex: 1;
      animation: fadeIn 0.3s ease-in-out;
    }

    .page.active-page {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero Section (Home) */
    .hero {
      text-align: center;
      padding: 6rem 1.5rem 4rem;
      background: linear-gradient(180deg, #fff0f3 0%, var(--bg-color) 100%);
    }

    .hero-content {
      max-width: 700px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 1rem;
      color: #333;
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--text-light);
      margin-bottom: 2rem;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.8rem;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .btn-primary {
      background-color: var(--strawberry);
      color: #fff;
    }

    .btn-secondary {
      background-color: var(--taro);
      color: var(--text-dark);
    }

    /* Features Section */
    .features {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
      text-align: center;
    }

    .features h2 {
      font-size: 2rem;
      margin-bottom: 3rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .card {
      background: var(--card-bg);
      padding: 2.5rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid #f0f0f0;
    }

    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      margin-bottom: 0.5rem;
    }

    .card p {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    /* Content Pages (Terms & Privacy) */
    .doc-container {
      max-width: 800px;
      margin: 3rem auto;
      padding: 3rem;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid #f0f0f0;
    }

    .doc-container h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .doc-container .last-updated {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .doc-container h2 {
      font-size: 1.3rem;
      margin: 1.8rem 0 0.8rem;
      color: var(--accent);
    }

    .doc-container p {
      color: var(--text-dark);
      margin-bottom: 1rem;
      font-size: 0.98rem;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
      font-size: 0.9rem;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo" onclick="switchPage('home')">🍡 MochiBot</div>
    <ul class="nav-links">
      <li><a id="nav-home" class="active" onclick="switchPage('home')">Home</a></li>
      <li><a id="nav-terms" onclick="switchPage('terms')">Terms of Service</a></li>
      <li><a id="nav-privacy" onclick="switchPage('privacy')">Privacy Policy</a></li>
    </ul>
  </nav>

  <main id="page-home" class="page active-page">
    <header class="hero">
      <div class="hero-content">
        <h1>Bring a splash of sweet
