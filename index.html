<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Background Page</title>
    <style>
        /* Reset margins and ensure full height */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fullscreen background styling */
        .bg-background {
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            
            /* Center the content container vertically and horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Translucent card to make text readable over the background */
        .content-card {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="bg-background">
        <div class="content-card">
            <h1>Welcome to My Page</h1>
            <p>This is a starter template using your requested image as a full-screen background. You can replace this text and build your project right inside this card!</p>
        </div>
    </div>

</body>
</html>
