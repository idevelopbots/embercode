<script>

async function loadServerData() {

    try {

        const [
            serverResponse,
            playersResponse,
            vehiclesResponse,
            staffResponse
        ] = await Promise.all([
            fetch("/api/server"),
            fetch("/api/players"),
            fetch("/api/vehicles"),
            fetch("/api/staff")
        ]);

        const serverData = await serverResponse.json();
        const players = await playersResponse.json();
        const vehicles = await vehiclesResponse.json();
        const staff = await staffResponse.json();

        // SERVER INFO

        document.getElementById("serverName").textContent =
            serverData.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (serverData.JoinKey || "N/A");

        document.getElementById("playerStats").textContent =
            `${serverData.CurrentPlayers || 0}/${serverData.MaxPlayers || 0} Players`;

        document.getElementById("playerCount").textContent =
            `${players.length} Players Online`;

        // PLAYERS

        const playerList =
            document.getElementById("playerList");

        playerList.innerHTML = "";

        if(players.length === 0){

            playerList.innerHTML =
                '<div class="loading">No players online.</div>';

        } else {

            players.forEach(player => {

                const card =
                    document.createElement("div");

                card.className = "player-card";

                card.innerHTML = `
                    <div class="player-name">
                        ${player.Player || "Unknown"}
                    </div>

                    <div class="player-team">
                        ${player.Team || "Civilian"}
                    </div>
                `;

                playerList.appendChild(card);

            });

        }

        // VEHICLES

        const vehicleList =
            document.getElementById("vehicleList");

        vehicleList.innerHTML = "";

        if(!vehicles || vehicles.length === 0){

            vehicleList.innerHTML =
                '<div class="loading">No active vehicles.</div>';

        } else {

            vehicles.forEach(vehicle => {

                const item =
                    document.createElement("div");

                item.className = "vehicle-item";

                item.innerHTML = `
                    <strong>
                        ${vehicle.Name || "Unknown Vehicle"}
                    </strong>

                    <div class="vehicle-owner">
                        Plate: ${vehicle.Plate || "N/A"}
                    </div>

                    <div class="vehicle-owner">
                        Owner: ${vehicle.Owner || "Unknown"}
                    </div>
                `;

                vehicleList.appendChild(item);

            });

        }

        // STAFF

        const staffList =
            document.getElementById("staffList");

        staffList.innerHTML = "";

        const admins =
            staff.Staff?.Admins || {};

        const mods =
            staff.Staff?.Mods || {};

        const helpers =
            staff.Staff?.Helpers || {};

        let hasStaff = false;

        Object.values(admins).forEach(admin => {

            hasStaff = true;

            const item =
                document.createElement("div");

            item.className = "staff-item";

            item.innerHTML = `
                <strong>👑 ${admin}</strong>

                <div>
                    <span class="staff-role">
                        Administrator
                    </span>
                </div>
            `;

            staffList.appendChild(item);

        });

        Object.values(mods).forEach(mod => {

            hasStaff = true;

            const item =
                document.createElement("div");

            item.className = "staff-item";

            item.innerHTML = `
                <strong>🔨 ${mod}</strong>

                <div>
                    <span class="staff-role">
                        Moderator
                    </span>
                </div>
            `;

            staffList.appendChild(item);

        });

        Object.values(helpers).forEach(helper => {

            hasStaff = true;

            const item =
                document.createElement("div");

            item.className = "staff-item";

            item.innerHTML = `
                <strong>⭐ ${helper}</strong>

                <div>
                    <span class="staff-role">
                        Helper
                    </span>
                </div>
            `;

            staffList.appendChild(item);

        });

        if(!hasStaff){

            staffList.innerHTML =
                '<div class="loading">No staff found.</div>';

        }

    } catch(error){

        console.error(error);

        document.getElementById("serverName").textContent =
            "Connection Failed";

        document.getElementById("joinCode").textContent =
            "Unable to contact API";

    }

}

loadServerData();

setInterval(loadServerData, 5000);

</script>
