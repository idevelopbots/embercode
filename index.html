<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Angeles Roleplay Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:#0f1117;
}

.overlay{
    width:100%;
    height:100%;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;
}

.main{
    flex:1;
    position:relative;
}

.server-header{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:18px 35px;
    min-width:420px;
}

#serverName{
    color:white;
    font-size:32px;
    font-weight:700;
}

#joinCode{
    color:#d0d0d0;
    font-size:15px;
    margin-top:6px;
}

#playerStats{
    color:#9ecfff;
    margin-top:8px;
}

.player-panel{
    width:350px;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(12px);
    border-left:1px solid rgba(255,255,255,.12);
    display:flex;
    flex-direction:column;
}

.player-panel-header{
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,.12);
}

.player-panel-header h2{
    color:white;
    font-size:24px;
}

#playerCount{
    color:#aaa;
    margin-top:5px;
    font-size:14px;
}

.player-list{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.player-card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
}

.player-name{
    color:white;
    font-weight:600;
}

.player-team{
    color:#bdbdbd;
    margin-top:4px;
    font-size:13px;
}

.loading{
    color:white;
    text-align:center;
    margin-top:25px;
}

</style>
</head>

<body>

<div class="overlay">

    <div class="main">

        <div class="server-header">

            <div id="serverName">
                Loading Server...
            </div>

            <div id="joinCode">
                Join Code: ------
            </div>

            <div id="playerStats">
                Loading...
            </div>

        </div>

    </div>

    <div class="player-panel">

        <div class="player-panel-header">

            <h2>Players</h2>

            <div id="playerCount">
                Loading...
            </div>

        </div>

        <div class="player-list" id="playerList">

            <div class="loading">
                Loading players...
            </div>

        </div>

    </div>

</div>

<script>

async function loadServerData() {

    try {

        const [serverResponse, playersResponse] =
            await Promise.all([
                fetch("/api/server"),
                fetch("/api/players")
            ]);

        const serverData = await serverResponse.json();
        const players = await playersResponse.json();

        document.getElementById("serverName").textContent =
            serverData.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (serverData.JoinKey || "N/A");

        document.getElementById("playerStats").textContent =
            `${serverData.CurrentPlayers || 0}/${serverData.MaxPlayers || 0} Players`;

        document.getElementById("playerCount").textContent =
            `${players.length} Players Online`;

        const playerList =
            document.getElementById("playerList");

        playerList.innerHTML = "";

        if(players.length === 0){

            playerList.innerHTML =
                '<div class="loading">No players online.</div>';

            return;

        }

        players.forEach(player => {

            const card =
                document.createElement("div");

            card.className = "player-card";

            card.innerHTML = `
                <div class="player-name">
                    ${player.Player || "Unknown"}
                </div>

                <div class="player-team">
                    ${player.Team || "Civilian"}
                </div>
            `;

            playerList.appendChild(card);

        });

    } catch(error){

        console.error(error);

        document.getElementById("serverName").textContent =
            "Connection Failed";

        document.getElementById("joinCode").textContent =
            "Unable to contact API";
    }

}

loadServerData();

setInterval(loadServerData, 5000);

</script>

</body>
</html>
