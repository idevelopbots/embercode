<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERLC Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;

    background:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdM7xpdhNRKYY_OEdQKxIPc1pAcQldBJBrBFODchAOkJ0wJmgucYnlMTvs&s=10");
    background-size:cover;
    background-position:center;
}

.overlay{
    width:100%;
    height:100%;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;
}

/* MAIN SECTION */

.main{
    flex:1;
    position:relative;
}

/* SERVER HEADER */

.server-header{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    text-align:center;

    background:rgba(0,0,0,.35);
    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.15);
    border-radius:16px;

    padding:15px 30px;

    min-width:350px;
}

#serverName{
    color:white;
    font-size:32px;
    font-weight:700;
}

#joinCode{
    color:#cfcfcf;
    margin-top:6px;
    font-size:15px;
}

/* PLAYER PANEL */

.player-panel{
    width:350px;
    background:rgba(0,0,0,.5);

    border-left:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    display:flex;
    flex-direction:column;
}

.player-panel-header{
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,.12);
}

.player-panel-header h2{
    color:white;
    font-size:24px;
}

#playerCount{
    color:#aaa;
    margin-top:5px;
    font-size:14px;
}

.player-list{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.player-list::-webkit-scrollbar{
    width:8px;
}

.player-list::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.2);
    border-radius:10px;
}

.player-card{
    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    border-radius:12px;

    padding:12px;
    margin-bottom:10px;

    transition:.2s;
}

.player-card:hover{
    background:rgba(255,255,255,.08);
}

.player-name{
    color:white;
    font-weight:600;
    font-size:15px;
}

.player-team{
    color:#aaa;
    font-size:13px;
    margin-top:4px;
}

/* LOADING */

.loading{
    color:white;
    text-align:center;
    margin-top:25px;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="main">

        <div class="server-header">

            <div id="serverName">
                Loading Server...
            </div>

            <div id="joinCode">
                Join Code: ------
            </div>

        </div>

    </div>

    <div class="player-panel">

        <div class="player-panel-header">

            <h2>Players</h2>

            <div id="playerCount">
                Loading...
            </div>

        </div>

        <div class="player-list" id="playerList">

            <div class="loading">
                Loading players...
            </div>

        </div>

    </div>

</div>

<script>

const API_KEY = "uupNgrOZhpdCgwStivKZ-WiDezheWTtqIXLQIlLmoICWddCjlpumqMyjkJfaJ";

async function loadServerData() {

    try {

        const response = await fetch(
            "https://api.erlc.gg/v2/server?Players=true",
            {
                headers: {
                    "server-key": API_KEY
                }
            }
        );

        const data = await response.json();

        document.getElementById("serverName").textContent =
            data.Name || "Unknown Server";

        document.getElementById("joinCode").textContent =
            "Join Code: " + (data.JoinKey || "N/A");

        const playerList =
            document.getElementById("playerList");

        playerList.innerHTML = "";

        const players = data.Players || [];

        document.getElementById("playerCount").textContent =
            players.length + " Players Online";

        if(players.length === 0){

            playerList.innerHTML =
                '<div class="loading">No players online.</div>';

            return;
        }

        players.forEach(player => {

            const card = document.createElement("div");
            card.className = "player-card";

            let playerName = player.Player || "Unknown";
            let teamName = player.Team || "Civilian";

            card.innerHTML = `
                <div class="player-name">${playerName}</div>
                <div class="player-team">${teamName}</div>
            `;

            playerList.appendChild(card);
        });

    }
    catch(error){

        console.error(error);

        document.getElementById("serverName").textContent =
            "Connection Failed";

        document.getElementById("joinCode").textContent =
            "Unable to contact API";

        document.getElementById("playerList").innerHTML =
            '<div class="loading">Could not load player data.</div>';
    }

}

loadServerData();

setInterval(loadServerData, 15000);

</script>

</body>
</html>
