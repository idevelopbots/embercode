<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Embed Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }

        h2 {
            color: #34495e;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="color"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="color"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        /* Field Array Styles */
        .field-array {
            background: #f8f9fa;
            border: 1px solid #ecf0f1;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .field-item {
            background: white;
            border: 1px solid #ecf0f1;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .field-item:last-child {
            margin-bottom: 0;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .field-number {
            color: #7f8c8d;
            font-weight: 600;
            font-size: 12px;
        }

        /* Preview Styles */
        .preview {
            background: #36393f;
            border-radius: 8px;
            padding: 20px;
            color: #dcddde;
            font-size: 14px;
        }

        .embed-preview {
            background: #2f3136;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .embed-title {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .embed-description {
            color: #dcddde;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .embed-field {
            margin-top: 10px;
        }

        .embed-field-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 13px;
        }

        .embed-footer {
            color: #72767d;
            font-size: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #202225;
        }

        .json-output {
            background: #1e1e1e;
            border: 1px solid #404040;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            position: relative;
        }

        .json-code {
            background: #1e1e1e;
            color: #ce9178;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 4px;
            line-height: 1.5;
        }

        .copy-button {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .color-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            cursor: pointer;
            padding: 2px;
        }

        .color-value {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .section-title {
            color: #667eea;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }

        .add-button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .add-button:hover {
            background: #5568d3;
        }

        .inline-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .inline-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .inline-row button {
            padding: 10px 15px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Panel -->
        <div class="panel">
            <h1>Discord Embed Builder</h1>
            
            <form id="embedForm">
                <!-- Basic Settings -->
                <div class="section-title">Basic Settings</div>
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Embed title" maxlength="256">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Embed description"></textarea>
                </div>

                <div class="form-group">
                    <label for="url">URL</label>
                    <input type="text" id="url" placeholder="https://example.com">
                </div>

                <!-- Color -->
                <div class="form-group">
                    <label>Color</label>
                    <div class="color-input-group">
                        <input type="color" id="color" value="#667eea">
                        <input type="text" class="color-value" id="colorHex" placeholder="#667eea" readonly>
                    </div>
                </div>

                <!-- Author -->
                <div class="section-title">Author</div>
                
                <div class="form-group">
                    <label for="authorName">Author Name</label>
                    <input type="text" id="authorName" placeholder="Author name" maxlength="256">
                </div>

                <div class="form-group">
                    <label for="authorUrl">Author URL</label>
                    <input type="text" id="authorUrl" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="authorIcon">Author Icon URL</label>
                    <input type="text" id="authorIcon" placeholder="https://example.com/icon.png">
                </div>

                <!-- Thumbnail -->
                <div class="section-title">Thumbnail</div>
                
                <div class="form-group">
                    <label for="thumbnailUrl">Thumbnail URL</label>
                    <input type="text" id="thumbnailUrl" placeholder="https://example.com/image.png">
                </div>

                <!-- Image -->
                <div class="section-title">Image</div>
                
                <div class="form-group">
                    <label for="imageUrl">Image URL</label>
                    <input type="text" id="imageUrl" placeholder="https://example.com/image.png">
                </div>

                <!-- Fields -->
                <div class="section-title">Fields</div>
                
                <div id="fieldsContainer" class="field-array"></div>
                <button type="button" class="add-button" onclick="addField()">+ Add Field</button>

                <!-- Footer -->
                <div class="section-title">Footer</div>
                
                <div class="form-group">
                    <label for="footerText">Footer Text</label>
                    <input type="text" id="footerText" placeholder="Footer text" maxlength="2048">
                </div>

                <div class="form-group">
                    <label for="footerIcon">Footer Icon URL</label>
                    <input type="text" id="footerIcon" placeholder="https://example.com/icon.png">
                </div>

                <!-- Timestamp -->
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="useTimestamp">
                        <span>Use Current Timestamp</span>
                    </label>
                </div>
            </form>
        </div>

        <!-- Preview Panel -->
        <div class="panel">
            <h1>Preview & JSON</h1>
            
            <div class="preview">
                <div class="embed-preview" id="embedPreview">
                    <div class="embed-title" id="previewTitle">Embed Title</div>
                    <div class="embed-description" id="previewDescription">Embed description goes here</div>
                    <div id="previewFields"></div>
                    <div class="embed-footer" id="previewFooter"></div>
                </div>
            </div>

            <div class="json-output">
                <button class="btn-success copy-button" onclick="copyJSON()">Copy JSON</button>
                <div class="json-code" id="jsonOutput"></div>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="resetForm()">Reset</button>
                <button class="btn-primary" onclick="downloadJSON()">Download JSON</button>
            </div>
        </div>
    </div>

    <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>

    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Add event listeners
            document.getElementById('title').addEventListener('input', updatePreview);
            document.getElementById('description').addEventListener('input', updatePreview);
            document.getElementById('url').addEventListener('input', updatePreview);
            document.getElementById('color').addEventListener('input', updateColor);
            document.getElementById('authorName').addEventListener('input', updatePreview);
            document.getElementById('authorUrl').addEventListener('input', updatePreview);
            document.getElementById('authorIcon').addEventListener('input', updatePreview);
            document.getElementById('thumbnailUrl').addEventListener('input', updatePreview);
            document.getElementById('imageUrl').addEventListener('input', updatePreview);
            document.getElementById('footerText').addEventListener('input', updatePreview);
            document.getElementById('footerIcon').addEventListener('input', updatePreview);
            document.getElementById('useTimestamp').addEventListener('change', updatePreview);

            // Initial preview
            updatePreview();
        });

        function updateColor() {
            const color = document.getElementById('color').value;
            document.getElementById('colorHex').value = color;
            updatePreview();
        }

        function addField() {
            const container = document.getElementById('fieldsContainer');
            const fieldCount = container.children.length;
            
            const fieldItem = document.createElement('div');
            fieldItem.className = 'field-item';
            fieldItem.innerHTML = `
                <div class="field-header">
                    <span class="field-number">Field ${fieldCount + 1}</span>
                    <button type="button" class="btn-danger" style="flex: 0; padding: 6px 12px; font-size: 12px;" onclick="removeField(this)">Remove</button>
                </div>
                <div class="form-group">
                    <label>Field Name</label>
                    <input type="text" class="field-name" placeholder="Field name" maxlength="256" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Field Value</label>
                    <textarea class="field-value" placeholder="Field value" oninput="updatePreview()"></textarea>
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" class="field-inline">
                        <span>Inline</span>
                    </label>
                </div>
            `;
            
            container.appendChild(fieldItem);
            updatePreview();
        }

        function removeField(button) {
            button.closest('.field-item').remove();
            updatePreview();
        }

        function updatePreview() {
            const title = document.getElementById('title').value || 'Embed Title';
            const description = document.getElementById('description').value || 'Embed description goes here';
            const color = document.getElementById('color').value;
            
            // Update preview
            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewDescription').textContent = description;
            
            // Update color
            const rgbColor = hexToRgb(color);
            document.getElementById('embedPreview').style.borderLeftColor = color;
            
            // Update fields preview
            const fieldsContainer = document.getElementById('previewFields');
            fieldsContainer.innerHTML = '';
            
            const fieldItems = document.querySelectorAll('.field-item');
            fieldItems.forEach(item => {
                const name = item.querySelector('.field-name').value;
                const value = item.querySelector('.field-value').value;
                
                if (name || value) {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'embed-field';
                    fieldDiv.innerHTML = `
                        <div class="embed-field-name">${escapeHtml(name || 'Unnamed')}</div>
                        <div class="embed-field-value">${escapeHtml(value || 'No value')}</div>
                    `;
                    fieldsContainer.appendChild(fieldDiv);
                }
            });
            
            // Update footer preview
            const footerText = document.getElementById('footerText').value;
            const previewFooter = document.getElementById('previewFooter');
            if (footerText) {
                previewFooter.textContent = footerText;
            } else {
                previewFooter.textContent = '';
            }
            
            // Generate JSON
            generateJSON();
        }

        function generateJSON() {
            const embed = {
                title: document.getElementById('title').value || undefined,
                description: document.getElementById('description').value || undefined,
                url: document.getElementById('url').value || undefined,
                color: parseInt(document.getElementById('color').value.substring(1), 16),
                author: {
                    name: document.getElementById('authorName').value || undefined,
                    url: document.getElementById('authorUrl').value || undefined,
                    icon_url: document.getElementById('authorIcon').value || undefined
                },
                thumbnail: {
                    url: document.getElementById('thumbnailUrl').value || undefined
                },
                image: {
                    url: document.getElementById('imageUrl').value || undefined
                },
                fields: [],
                footer: {
                    text: document.getElementById('footerText').value || undefined,
                    icon_url: document.getElementById('footerIcon').value || undefined
                },
                timestamp: document.getElementById('useTimestamp').checked ? new Date().toISOString() : undefined
            };

            // Add fields
            document.querySelectorAll('.field-item').forEach(item => {
                const name = item.querySelector('.field-name').value;
                const value = item.querySelector('.field-value').value;
                const inline = item.querySelector('.field-inline').checked;
                
                if (name && value) {
                    embed.fields.push({
                        name: name,
                        value: value,
                        inline: inline
                    });
                }
            });

            // Clean up undefined values
            const cleanEmbed = JSON.parse(JSON.stringify(embed, (key, value) => {
                if (value === undefined) return undefined;
                if (typeof value === 'object' && value !== null) {
                    const cleaned = {};
                    for (const k in value) {
                        if (value[k] !== undefined) {
                            cleaned[k] = value[k];
                        }
                    }
                    return Object.keys(cleaned).length > 0 ? cleaned : undefined;
                }
                return value;
            }));

            const jsonOutput = {
                embeds: [cleanEmbed]
            };

            document.getElementById('jsonOutput').textContent = JSON.stringify(jsonOutput, null, 2);
        }

        function copyJSON() {
            const jsonText = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(jsonText).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        function downloadJSON() {
            const jsonText = document.getElementById('jsonOutput').textContent;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(jsonText));
            element.setAttribute('download', 'discord-embed.json');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function resetForm() {
            document.getElementById('embedForm').reset();
            document.getElementById('fieldsContainer').innerHTML = '';
            document.getElementById('color').value = '#667eea';
            document.getElementById('colorHex').value = '#667eea';
            updatePreview();
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
