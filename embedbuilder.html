<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Embed Builder - Final</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 30px;
            border: 1px solid #2a2a2a;
            height: fit-content;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
        }

        /* Embed Tabs */
        .embed-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .embed-tab {
            padding: 8px 16px;
            background: #242424;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .embed-tab:hover {
            background: #2a2a2a;
        }

        .embed-tab.active {
            background: #5865f2;
            color: white;
            border-color: #5865f2;
        }

        .btn-add-embed {
            background: #3ba374;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .btn-add-embed:hover {
            background: #2d7d59;
        }

        .tab-close {
            font-size: 16px;
            opacity: 0.6;
        }

        .tab-close:hover {
            opacity: 1;
        }

        .section-title {
            color: #5865f2;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #b0b0b0;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="color"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            background: #242424;
            color: #e0e0e0;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="color"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #5865f2;
            background: #2a2a2a;
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }

        /* Combined URL Textbox and Upload Button styling */
        .image-input-group {
            display: flex;
            gap: 10px;
        }

        .image-input-group input[type="text"] {
            flex: 1;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            background-color: #242424;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            height: 100%;
        }

        .btn-upload:hover {
            background-color: #2a2a2a;
            border-color: #5865f2;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #5865f2;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #333333;
        }

        .btn-danger {
            background: #ed4245;
            color: white;
        }

        .btn-danger:hover {
            background: #d83c3e;
        }

        .btn-success {
            background: #57f287;
            color: #000000;
            font-weight: 700;
        }

        .btn-success:hover {
            background: #3ba374;
            color: #ffffff;
        }

        /* Field Array Styles */
        .field-array {
            background: #242424;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 50px;
        }

        .field-item {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: grab;
            position: relative;
        }

        .field-item.dragging {
            opacity: 0.5;
            border: 2px dashed #5865f2;
        }

        .field-item:last-child {
            margin-bottom: 0;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .field-number {
            color: #7a7a7a;
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .drag-handle {
            color: #4a4a4a;
            cursor: grab;
            font-size: 16px;
        }

        .field-controls {
            display: flex;
            gap: 5px;
        }

        .control-btn {
            padding: 4px 8px;
            font-size: 11px;
            background: #2a2a2a;
            color: #b0b0b0;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
        }

        /* Preview Layout Refined for Images */
        .preview-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .embed-preview {
            background: #1d1e21;
            border-left: 4px solid #5865f2;
            border-radius: 4px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 520px;
        }

        .embed-main-content {
            display: flex;
            gap: 16px;
            justify-content: space-between;
        }

        .embed-text-section {
            flex: 1;
        }

        .embed-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .embed-author-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .embed-author-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        .embed-author-name:hover {
            text-decoration: underline;
        }

        .embed-title {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .embed-title a {
            color: #00b0f4;
            text-decoration: none;
        }

        .embed-title a:hover {
            text-decoration: underline;
        }

        .embed-description {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.375;
            white-space: pre-wrap;
        }

        .embed-thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .embed-fields-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }

        .embed-field {
            grid-column: span 3;
        }

        .embed-field.inline {
            grid-column: span 1;
        }

        .embed-field-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .embed-field-value {
            color: #b0b0b0;
            font-size: 13px;
            white-space: pre-wrap;
        }

        .embed-image-container {
            margin-top: 8px;
            max-width: 100%;
        }

        .embed-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            object-fit: contain;
        }

        .embed-footer-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .embed-footer-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        .embed-footer {
            color: #72767d;
            font-size: 12px;
        }

        .embed-separator {
            margin: 12px 0;
            border: none;
            border-top: 1px solid #2f3136;
        }

        .separator-preview-text {
            color: #72767d;
            font-size: 12px;
            text-align: center;
            margin: 4px 0;
            font-style: italic;
        }

        .json-output {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            position: relative;
        }

        .json-code {
            background: #1a1a1a;
            color: #a8d8a8;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 4px;
            line-height: 1.5;
            border: 1px solid #2a2a2a;
        }

        .copy-button {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #57f287;
            color: #000000;
            padding: 12px 20px;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
            font-weight: 600;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #5865f2;
        }

        .color-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            cursor: pointer;
            padding: 2px;
            border-radius: 6px;
        }

        .color-value {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: #242424;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
        }

        .add-buttons-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-button {
            flex: 1;
            padding: 10px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .add-button.btn-separator {
            background: #4f545c;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h1>Embed Builder</h1>
            
            <div class="embed-tabs" id="embedTabs">
                <button class="btn-add-embed" onclick="createNewEmbed()">+ Add Embed</button>
            </div>

            <form id="embedForm" onsubmit="event.preventDefault();">
                <div class="section-title">Basic Settings</div>
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Embed title" maxlength="256">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Embed description"></textarea>
                </div>

                <div class="form-group">
                    <label for="url">URL</label>
                    <input type="text" id="url" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <div class="color-input-group">
                        <input type="color" id="color" value="#5865f2">
                        <input type="text" class="color-value" id="colorHex" placeholder="#5865f2" readonly>
                    </div>
                </div>

                <div class="section-title">Author</div>
                
                <div class="form-group">
                    <label for="authorName">Author Name</label>
                    <input type="text" id="authorName" placeholder="Author name" maxlength="256">
                </div>

                <div class="form-group">
                    <label for="authorUrl">Author URL</label>
                    <input type="text" id="authorUrl" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="authorIcon">Author Icon</label>
                    <div class="image-input-group">
                        <input type="text" id="authorIcon" placeholder="https://example.com/icon.png">
                        <div class="upload-btn-wrapper">
                            <button type="button" class="btn-upload">Upload</button>
                            <input type="file" accept="image/*" onchange="handleFileUpload(this, 'authorIcon')">
                        </div>
                    </div>
                </div>

                <div class="section-title">Thumbnail</div>
                
                <div class="form-group">
                    <label for="thumbnailUrl">Thumbnail</label>
                    <div class="image-input-group">
                        <input type="text" id="thumbnailUrl" placeholder="https://example.com/image.png">
                        <div class="upload-btn-wrapper">
                            <button type="button" class="btn-upload">Upload</button>
                            <input type="file" accept="image/*" onchange="handleFileUpload(this, 'thumbnailUrl')">
                        </div>
                    </div>
                </div>

                <div class="section-title">Image</div>
                
                <div class="form-group">
                    <label for="imageUrl">Image</label>
                    <div class="image-input-group">
                        <input type="text" id="imageUrl" placeholder="https://example.com/image.png">
                        <div class="upload-btn-wrapper">
                            <button type="button" class="btn-upload">Upload</button>
                            <input type="file" accept="image/*" onchange="handleFileUpload(this, 'imageUrl')">
                        </div>
                    </div>
                </div>

                <div class="section-title">Fields & Separators</div>
                
                <div id="fieldsContainer" class="field-array"></div>
                <div class="add-buttons-container">
                    <button type="button" class="add-button" onclick="addField()">+ Add Field</button>
                    <button type="button" class="add-button btn-separator" onclick="addSeparator()">+ Add Separator</button>
                </div>

                <div class="section-title">Footer</div>
                
                <div class="form-group">
                    <label for="footerText">Footer Text</label>
                    <input type="text" id="footerText" placeholder="Footer text" maxlength="2048">
                </div>

                <div class="form-group">
                    <label for="footerIcon">Footer Icon</label>
                    <div class="image-input-group">
                        <input type="text" id="footerIcon" placeholder="https://example.com/icon.png">
                        <div class="upload-btn-wrapper">
                            <button type="button" class="btn-upload">Upload</button>
                            <input type="file" accept="image/*" onchange="handleFileUpload(this, 'footerIcon')">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="useTimestamp">
                        <span>Use Current Timestamp</span>
                    </label>
                </div>
            </form>
        </div>

        <div class="panel">
            <h1>Preview & JSON</h1>
            
            <div class="preview-container" id="previewContainer"></div>

            <div class="json-output">
                <button class="btn-success copy-button" onclick="copyJSON()">Copy JSON</button>
                <div class="json-code" id="jsonOutput"></div>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="resetForm()">Reset All</button>
                <button class="btn-primary" onclick="downloadJSON()">Download JSON</button>
            </div>
        </div>
    </div>

    <div class="copy-feedback" id="copyFeedback">Copied to clipboard!</div>

    <script>
        let embeds = [];
        let activeEmbedIndex = 0;

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', function() {
            createNewEmbed();

            const formInputs = ['title', 'description', 'url', 'authorName', 'authorUrl', 'authorIcon', 'thumbnailUrl', 'imageUrl', 'footerText', 'footerIcon'];
            formInputs.forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    saveCurrentState();
                    updateAllPreviews();
                });
            });

            document.getElementById('color').addEventListener('input', () => {
                document.getElementById('colorHex').value = document.getElementById('color').value;
                saveCurrentState();
                updateAllPreviews();
            });

            document.getElementById('useTimestamp').addEventListener('change', () => {
                saveCurrentState();
                updateAllPreviews();
            });

            const container = document.getElementById('fieldsContainer');
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientY);
                const draggable = document.querySelector('.dragging');
                if (afterElement == null) {
                    container.appendChild(draggable);
                } else {
                    container.insertBefore(draggable, afterElement);
                }
            });

            container.addEventListener('dragend', () => {
                renumberFields();
                saveCurrentState();
                updateAllPreviews();
            });
        });

        function handleFileUpload(inputElement, targetInputId) {
            const file = inputElement.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById(targetInputId).value = e.target.result;
                saveCurrentState();
                updateAllPreviews();
            };
            reader.readAsDataURL(file);
        }

        function createNewEmbed() {
            const newEmbed = {
                title: '',
                description: '',
                url: '',
                color: '#5865f2',
                authorName: '',
                authorUrl: '',
                authorIcon: '',
                thumbnailUrl: '',
                imageUrl: '',
                fields: [],
                footerText: '',
                footerIcon: '',
                useTimestamp: false
            };
            embeds.push(newEmbed);
            activeEmbedIndex = embeds.length - 1;
            renderTabs();
            loadEmbed(activeEmbedIndex);
            updateAllPreviews();
        }

        function deleteEmbed(index, event) {
            event.stopPropagation();
            if (embeds.length <= 1) return;
            
            embeds.splice(index, 1);
            if (activeEmbedIndex >= embeds.length) {
                activeEmbedIndex = embeds.length - 1;
            }
            renderTabs();
            loadEmbed(activeEmbedIndex);
            updateAllPreviews();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('embedTabs');
            const addBtn = tabsContainer.querySelector('.btn-add-embed');
            
            const existingTabs = tabsContainer.querySelectorAll('.embed-tab');
            existingTabs.forEach(tab => tab.remove());

            embeds.forEach((embed, index) => {
                const tab = document.createElement('div');
                tab.className = `embed-tab ${index === activeEmbedIndex ? 'active' : ''}`;
                tab.onclick = () => switchEmbed(index);
                
                const title = embed.title || `Embed ${index + 1}`;
                tab.innerHTML = `
                    <span>${title.length > 15 ? title.substring(0, 12) + '...' : title}</span>
                    ${embeds.length > 1 ? `<span class="tab-close" onclick="deleteEmbed(${index}, event)">×</span>` : ''}
                `;
                
                tabsContainer.insertBefore(tab, addBtn);
            });
        }

        function switchEmbed(index) {
            saveCurrentState();
            activeEmbedIndex = index;
            renderTabs();
            loadEmbed(index);
            updateAllPreviews();
        }

        function saveCurrentState() {
            if (!embeds[activeEmbedIndex]) return;
            
            const embed = embeds[activeEmbedIndex];
            embed.title = document.getElementById('title').value;
            embed.description = document.getElementById('description').value;
            embed.url = document.getElementById('url').value;
            embed.color = document.getElementById('color').value;
            embed.authorName = document.getElementById('authorName').value;
            embed.authorUrl = document.getElementById('authorUrl').value;
            embed.authorIcon = document.getElementById('authorIcon').value;
            embed.thumbnailUrl = document.getElementById('thumbnailUrl').value;
            embed.imageUrl = document.getElementById('imageUrl').value;
            embed.footerText = document.getElementById('footerText').value;
            embed.footerIcon = document.getElementById('footerIcon').value;
            embed.useTimestamp = document.getElementById('useTimestamp').checked;

            embed.fields = [];
            document.querySelectorAll('.field-item').forEach(item => {
                if (item.classList.contains('separator-item')) {
                    embed.fields.push({
                        type: 'separator',
                        text: item.querySelector('.separator-text').value
                    });
                } else {
                    embed.fields.push({
                        type: 'field',
                        name: item.querySelector('.field-name').value,
                        value: item.querySelector('.field-value').value,
                        inline: item.querySelector('.field-inline').checked
                    });
                }
            });
            
            renderTabs();
        }

        function loadEmbed(index) {
            const embed = embeds[index];
            document.getElementById('title').value = embed.title;
            document.getElementById('description').value = embed.description;
            document.getElementById('url').value = embed.url;
            document.getElementById('color').value = embed.color;
            document.getElementById('colorHex').value = embed.color;
            document.getElementById('authorName').value = embed.authorName;
            document.getElementById('authorUrl').value = embed.authorUrl;
            document.getElementById('authorIcon').value = embed.authorIcon;
            document.getElementById('thumbnailUrl').value = embed.thumbnailUrl;
            document.getElementById('imageUrl').value = embed.imageUrl;
            document.getElementById('footerText').value = embed.footerText;
            document.getElementById('footerIcon').value = embed.footerIcon;
            document.getElementById('useTimestamp').checked = embed.useTimestamp;

            const container = document.getElementById('fieldsContainer');
            container.innerHTML = '';
            embed.fields.forEach(f => {
                if (f.type === 'separator') {
                    addSeparator(f.text);
                } else {
                    addField(f.name, f.value, f.inline);
                }
            });
        }

        function addField(name = '', value = '', inline = false) {
            const container = document.getElementById('fieldsContainer');
            const fieldItem = document.createElement('div');
            fieldItem.className = 'field-item';
            fieldItem.draggable = true;
            
            fieldItem.innerHTML = `
                <div class="field-header">
                    <span class="field-number"><span class="drag-handle">☰</span> Field</span>
                    <div class="field-controls">
                        <button type="button" class="control-btn" onclick="moveUp(this)">↑</button>
                        <button type="button" class="control-btn" onclick="moveDown(this)">↓</button>
                        <button type="button" class="btn-danger" style="padding: 4px 8px; font-size: 11px;" onclick="removeField(this)">Remove</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Field Name</label>
                    <input type="text" class="field-name" value="${escapeHtml(name)}" placeholder="Field name" oninput="saveCurrentState(); updateAllPreviews()">
                </div>
                <div class="form-group">
                    <label>Field Value</label>
                    <textarea class="field-value" placeholder="Field value" oninput="saveCurrentState(); updateAllPreviews()">${escapeHtml(value)}</textarea>
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" class="field-inline" ${inline ? 'checked' : ''} onchange="saveCurrentState(); updateAllPreviews()">
                        <span>Inline</span>
                    </label>
                </div>
            `;
            
            setupDraggable(fieldItem);
            container.appendChild(fieldItem);
            renumberFields();
        }

        function addSeparator(text = '') {
            const container = document.getElementById('fieldsContainer');
            const fieldItem = document.createElement('div');
            fieldItem.className = 'field-item separator-item';
            fieldItem.draggable = true;
            
            fieldItem.innerHTML = `
                <div class="field-header">
                    <span class="field-number"><span class="drag-handle">☰</span> Separator</span>
                    <div class="field-controls">
                        <button type="button" class="control-btn" onclick="moveUp(this)">↑</button>
                        <button type="button" class="control-btn" onclick="moveDown(this)">↓</button>
                        <button type="button" class="btn-danger" style="padding: 4px 8px; font-size: 11px;" onclick="removeField(this)">Remove</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Separator Text (optional)</label>
                    <input type="text" class="separator-text" value="${escapeHtml(text)}" placeholder="e.g. ▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬" oninput="saveCurrentState(); updateAllPreviews()">
                </div>
            `;
            
            setupDraggable(fieldItem);
            container.appendChild(fieldItem);
            renumberFields();
        }

        function setupDraggable(item) {
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
        }

        function removeField(button) {
            button.closest('.field-item').remove();
            renumberFields();
            saveCurrentState();
            updateAllPreviews();
        }

        function moveUp(button) {
            const item = button.closest('.field-item');
            if (item.previousElementSibling) {
                item.parentNode.insertBefore(item, item.previousElementSibling);
                renumberFields();
                saveCurrentState();
                updateAllPreviews();
            }
        }

        function moveDown(button) {
            const item = button.closest('.field-item');
            if (item.nextElementSibling) {
                item.parentNode.insertBefore(item.nextElementSibling, item);
                renumberFields();
                saveCurrentState();
                updateAllPreviews();
            }
        }

        function renumberFields() {
            // Keep dynamic layout consistent
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.field-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function hexToDecimal(hex) {
            return parseInt(hex.replace('#', ''), 16);
        }

        function updateAllPreviews() {
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = '';

            let jsonEmbedsArray = [];

            embeds.forEach((embed) => {
                let hasContent = embed.title || embed.description || embed.authorName || embed.thumbnailUrl || embed.imageUrl || embed.footerText || embed.fields.length > 0;
                if (!hasContent) return;

                const previewHtml = document.createElement('div');
                previewHtml.className = 'embed-preview';
                previewHtml.style.borderLeftColor = embed.color;

                let authorMarkup = '';
                if (embed.authorName) {
                    authorMarkup = `
                        <div class="embed-author">
                            ${embed.authorIcon ? `<img src="${escapeHtml(embed.authorIcon)}" class="embed-author-icon" alt="">` : ''}
                            ${embed.authorUrl ? `<a href="${escapeHtml(embed.authorUrl)}" target="_blank" class="embed-author-name">${escapeHtml(embed.authorName)}</a>` : `<span class="embed-author-name">${escapeHtml(embed.authorName)}</span>`}
                        </div>
                    `;
                }

                let titleMarkup = '';
                if (embed.title) {
                    titleMarkup = `
                        <div class="embed-title">
                            ${embed.url ? `<a href="${escapeHtml(embed.url)}" target="_blank">${escapeHtml(embed.title)}</a>` : `<span>${escapeHtml(embed.title)}</span>`}
                        </div>
                    `;
                }

                let descMarkup = '';
                if (embed.description) {
                    descMarkup = `<div class="embed-description">${escapeHtml(embed.description)}</div>`;
                }

                let fieldsGridMarkup = '';
                if (embed.fields.length > 0) {
                    let insideGrid = false;
                    let elementsBuffer = '';

                    embed.fields.forEach(f => {
                        if (f.type === 'separator') {
                            if (insideGrid) {
                                elementsBuffer += '</div>';
                                insideGrid = false;
                            }
                            elementsBuffer += `<hr class="embed-separator">${f.text ? `<div class="separator-preview-text">${escapeHtml(f.text)}</div><hr class="embed-separator">` : ''}`;
                        } else {
                            if (!insideGrid) {
                                elementsBuffer += '<div class="embed-fields-grid">';
                                insideGrid = true;
                            }
                            elementsBuffer += `
                                <div class="embed-field ${f.inline ? 'inline' : ''}">
                                    <div class="embed-field-name">${escapeHtml(f.name || '\u200b')}</div>
                                    <div class="embed-field-value">${escapeHtml(f.value || '\u200b')}</div>
                                </div>
                            `;
                        }
                    });

                    if (insideGrid) elementsBuffer += '</div>';
                    fieldsGridMarkup = elementsBuffer;
                }

                let thumbnailMarkup = '';
                if (embed.thumbnailUrl) {
                    thumbnailMarkup = `<img src="${escapeHtml(embed.thumbnailUrl)}" class="embed-thumbnail" alt="">`;
                }

                let imageMarkup = '';
                if (embed.imageUrl) {
                    imageMarkup = `
                        <div class="embed-image-container">
                            <img src="${escapeHtml(embed.imageUrl)}" class="embed-image" alt="">
                        </div>
                    `;
                }

                let footerMarkup = '';
                if (embed.footerText || embed.useTimestamp) {
                    let timestampText = embed.useTimestamp ? new Date().toLocaleString() : '';
                    let footerCombined = embed.footerText + (embed.footerText && timestampText ? ' • ' : '') + timestampText;
                    footerMarkup = `
                        <div class="embed-footer-wrapper">
                            ${embed.footerIcon ? `<img src="${escapeHtml(embed.footerIcon)}" class="embed-footer-icon" alt="">` : ''}
                            <span class="embed-footer">${escapeHtml(footerCombined)}</span>
                        </div>
                    `;
                }

                // Layout Structure Update: Isolating Text Area + Thumbnail from Full Width Images
                previewHtml.innerHTML = `
                    ${authorMarkup}
                    <div class="embed-main-content">
                        <div class="embed-text-section">
                            ${titleMarkup}
                            ${descMarkup}
                        </div>
                        ${thumbnailMarkup}
                    </div>
                    ${fieldsGridMarkup}
                    ${imageMarkup}
                    ${footerMarkup}
                `;

                previewContainer.appendChild(previewHtml);

                // Build pure Discord object JSON structure
                let jsonObject = {};
                if (embed.title) jsonObject.title = embed.title;
                if (embed.description) jsonObject.description = embed.description;
                if (embed.url) jsonObject.url = embed.url;
                jsonObject.color = hexToDecimal(embed.color);

                if (embed.authorName) {
                    jsonObject.author = { name: embed.authorName };
                    if (embed.authorUrl) jsonObject.author.url = embed.authorUrl;
                    if (embed.authorIcon) jsonObject.author.icon_url = embed.authorIcon;
                }

                if (embed.thumbnailUrl) jsonObject.thumbnail = { url: embed.thumbnailUrl };
                if (embed.imageUrl) jsonObject.image = { url: embed.imageUrl };

                if (embed.fields.length > 0) {
                    jsonObject.fields = [];
                    embed.fields.forEach(f => {
                        if (f.type !== 'separator') {
                            jsonObject.fields.push({
                                name: f.name || '\u200b',
                                value: f.value || '\u200b',
                                inline: f.inline
                            });
                        }
                    });
                }

                if (embed.footerText) {
                    jsonObject.footer = { text: embed.footerText };
                    if (embed.footerIcon) jsonObject.footer.icon_url = embed.footerIcon;
                }

                if (embed.useTimestamp) {
                    jsonObject.timestamp = new Date().toISOString();
                }

                jsonEmbedsArray.push(jsonObject);
            });

            const finalJsonOutput = { embeds: jsonEmbedsArray };
            document.getElementById('jsonOutput').innerText = JSON.stringify(finalJsonOutput, null, 2);
        }

        function copyJSON() {
            const codeText = document.getElementById('jsonOutput').innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => feedback.classList.remove('show'), 2000);
            });
        }

        function resetForm() {
            embeds = [];
            activeEmbedIndex = 0;
            document.getElementById('embedForm').reset();
            document.getElementById('colorHex').value = '#5865f2';
            createNewEmbed();
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(document.getElementById('jsonOutput').innerText);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "embed.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
