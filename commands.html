<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emebr Commands</title>
    <style>
        :root {
            --fire-dark: #150505;
            --fire-charcoal: #2c0b0e;
            --fire-red: #900c3f;
            --fire-orange: #ff5733;
            --fire-yellow: #ffc300;
            --text-light: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fire-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            background-image: linear-gradient(180deg, var(--fire-dark) 0%, #000000 100%);
            min-height: 100vh;
        }

        /* Navigation Bar Styles */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(21, 5, 5, 0.85);
            border-bottom: 2px solid var(--fire-red);
            backdrop-filter: blur(5px);
        }

        .nav-logo {
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--fire-yellow);
            text-shadow: 0 0 8px var(--fire-orange);
            text-decoration: none;
        }

        .nav-right {
            display: flex;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            color: #d0d0d0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: var(--fire-orange);
            text-shadow: 0 0 10px var(--fire-orange);
        }

        /* Main Content Layout */
        header {
            text-align: center;
            padding: 40px 0 20px 0;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--fire-yellow);
            text-shadow: 0 0 10px var(--fire-orange), 0 0 20px var(--fire-red);
        }

        header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        /* Command Card Styles */
        .card {
            background: linear-gradient(145deg, var(--fire-charcoal), #1a0507);
            border: 1px solid var(--fire-red);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--fire-red), var(--fire-orange), var(--fire-yellow));
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--fire-orange);
            box-shadow: 0 12px 20px rgba(255, 87, 51, 0.2);
        }

        .command-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--fire-yellow);
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 195, 0, 0.2);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .command-name::before {
            content: '🔥';
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .field {
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .label {
            font-weight: 600;
            color: var(--fire-orange);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
        }

        .value {
            color: #e0e0e0;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            background-color: rgba(144, 12, 63, 0.3);
            border: 1px solid var(--fire-red);
            color: #ff9e9e;
        }

        .badge.admin {
            background-color: rgba(255, 87, 51, 0.2);
            border: 1px solid var(--fire-orange);
            color: #ffb09c;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">Ember</a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="commands.html" class="active">Commands</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <h1>Ember Commands</h1>
        <p>Available system commands</p>
    </header>

    <div class="container">
        
        <div class="card">
            <div class="command-name">/ad-channel</div>
            <div class="field">
                <span class="label">What it does:</span>
                <span class="value">Set the channel that you want Ember to send the ads.</span>
            </div>
            <div class="field">
                <span class="label">Who can use them:</span>
                <span class="badge">Server Owners / Anyone with Administrator</span>
            </div>
        </div>

    </div>

</body>
</html>
