<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ember ER:LC Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            position: relative;
            color: #ffffff;
            padding-bottom: 15vh;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #900c3f;
            z-index: 100;
        }

        .nav-left .brand {
            color: #ff6a00;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #ff6a00;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-right .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-right .nav-links a {
            color: #d0d0d0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-right .nav-links a:hover, 
        .nav-right .nav-links a.active {
            color: #ff6a00;
            text-shadow: 0 0 10px #ff6a00;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 120px auto 40px auto;
            padding: 0 20px;
            z-index: 10;
        }

        .header-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: #ffc300;
            text-shadow: 0 0 15px #ff6a00, 0 0 30px #900c3f;
        }

        .dashboard-card {
            background: linear-gradient(145deg, #2c0b0e, #1a0507);
            border: 2px solid #900c3f;
            border-radius: 12px;
            padding: 35px 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .dashboard-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #900c3f, #ff6a00, #ffc300);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff5733;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #900c3f;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #ff6a00;
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.3);
        }

        .btn-submit {
            display: block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 106, 0, 0.5);
        }

        .commands-panel {
            display: none;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .btn-cmd {
            background: rgba(44, 11, 14, 0.6);
            border: 1px solid #900c3f;
            color: #ffffff;
            padding: 20px 15px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .btn-cmd span.syntax {
            font-size: 0.8rem;
            color: #ffc300;
            font-weight: normal;
            opacity: 0.8;
        }

        .btn-cmd:hover {
            background: linear-gradient(135deg, #900c3f 0%, #ff6a00 100%);
            border-color: #ffc300;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 106, 0, 0.4);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #160406;
            border: 2px solid #ff6a00;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255, 106, 0, 0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-header {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffc300;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid #900c3f;
            padding-bottom: 10px;
        }

        .player-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .player-list::-webkit-scrollbar {
            width: 6px;
        }
        .player-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .player-list::-webkit-scrollbar-thumb {
            background: #900c3f;
            border-radius: 3px;
        }

        .player-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid #2c0b0e;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .player-item:hover {
            background: rgba(255, 106, 0, 0.15);
            border-color: #ff6a00;
            color: #ffc300;
            padding-left: 20px;
        }
        
        .player-item.selected {
            background: rgba(255, 106, 0, 0.25);
            border-color: #ffc300;
            color: #ffc300;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-modal {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: #222;
            color: #ccc;
        }

        .btn-cancel:hover {
            background: #333;
            color: #fff;
        }

        .btn-confirm {
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: white;
        }

        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12vh;
            min-height: 80px;
            max-height: 120px;
            z-index: 1;
            pointer-events: none;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
                text-align: center;
            }
            .container {
                margin-top: 160px;
            }
            .header-title {
                font-size: 2.2rem;
            }
            .commands-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .btn-cmd {
                padding: 15px 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand">🔥 Ember</a>
        </div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="commands.html">Commands</a></li>
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="header-title">Server Controller</h1>
        
        <div class="dashboard-card" id="api-setup-card">
            <div class="form-group">
                <label class="form-label" for="api-key">ER:LC Server API Key</label>
                <input type="password" id="api-key" class="form-input" placeholder="Enter your server API key token...">
                
                <button class="btn-submit" onclick="initializeDashboard()">Connect API Terminal</button>
            </div>
        </div>

        <div class="dashboard-card commands-panel" id="controls-panel">
            <label class="form-label" style="display:block; margin-bottom:15px;">Active Server Directives</label>
            <div class="commands-grid">
                <button class="btn-cmd" onclick="openTargetModal('kill')">💀 Kill <span class="syntax">:kill [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('down')">🩸 Down <span class="syntax">:down [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('tp')">🌀 Teleport <span class="syntax">:tp [P1] [P2]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('refresh')">🔄 Refresh <span class="syntax">:refresh [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('bring')">🧲 Bring <span class="syntax">:bring [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('heal')">❤️ Heal <span class="syntax">:heal [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('view')">👁️ View <span class="syntax">:view [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('unwanted')">😇 Unwanted <span class="syntax">:unwanted [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('wanted')">🚨 Wanted <span class="syntax">:wanted [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('jail')">🔒 Jail <span class="syntax">:jail [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('respawn')">✨ Respawn <span class="syntax">:respawn [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('load')">📦 Load <span class="syntax">:load [Player]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('kick')">🥾 Kick <span class="syntax">:kick [Player] [Reason]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('ban')">🚫 Ban <span class="syntax">:ban [Player/ID]</span></button>
                <button class="btn-cmd" onclick="openTargetModal('unban')">🔓 Unban <span class="syntax">:unban [Player/ID]</span></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="target-modal">
        <div class="modal-card">
            <div class="modal-header" id="modal-title-text">Select Target Player</div>
            
            <div id="extra-fields-container" class="form-group" style="margin-bottom:15px; display:none;"></div>
            
            <div class="player-list" id="modal-player-list">
                </div>
            
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeTargetModal()">Cancel</button>
                <button class="btn-modal btn-confirm" onclick="processActionExecution()">Execute Command</button>
            </div>
        </div>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            <linearGradient id="fireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff6a00" />
                <stop offset="100%" stop-color="#ee0979" />
            </linearGradient>
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="url(#fireGradient)" fill-opacity="0.3" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="url(#fireGradient)" fill-opacity="0.5" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="url(#fireGradient)" fill-opacity="0.7" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="url(#fireGradient)" />
        </g>
    </svg>

    <script>
        let apiKey = "";
        let activeCommand = "";
        let selectedPlayer = "";
        let globalPlayersCache = [];

        // --- CONFIGURATION MANAGEMENT ---
        // Change USE_PROXY to true if you route requests through a custom backend
        const CONFIG = {
            USE_PROXY: false,
            PROXY_URL: "https://your-backend-proxy.com/api" 
        };

        function initializeDashboard() {
            const keyInput = document.getElementById('api-key').value.trim();

            if (!keyInput) {
                alert("⚠️ Please fill in the API Key.");
                return;
            }

            apiKey = keyInput;

            document.getElementById('api-setup-card').style.display = 'none';
            document.getElementById('controls-panel').style.display = 'block';
            
            // Prefetch active players right away to cache them for modal performance
            fetchActiveServerPlayers();
        }

        async function fetchActiveServerPlayers() {
            const endpoint = CONFIG.USE_PROXY 
                ? `${CONFIG.PROXY_URL}/players`
                : `https://api.policeroleplay.community/v1/server`;

            const requestHeaders = CONFIG.USE_PROXY ? {} : { 'Server-API-Key': apiKey };

            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: requestHeaders
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }

                const serverData = await response.json();
                
                // ER:LC returns an object with a "Players" array profile containing active users
                if (serverData && Array.isArray(serverData.Players)) {
                    globalPlayersCache = serverData.Players;
                } else {
                    globalPlayersCache = [];
                }
            } catch (error) {
                console.error("Failed fetching live player roster profile from ER:LC API:", error);
                globalPlayersCache = [];
            }
        }

        async function openTargetModal(commandType) {
            activeCommand = commandType;
            selectedPlayer = "";
            
            const modal = document.getElementById('target-modal');
            const title = document.getElementById('modal-title-text');
            const playerListDiv = document.getElementById('modal-player-list');
            const extraContainer = document.getElementById('extra-fields-container');
            
            title.innerText = `Target Options: :${commandType}`;
            playerListDiv.innerHTML = "<div style='padding:10px; color:#ff6a00;'>🔄 Synchronizing live server roster...</div>";
            extraContainer.innerHTML = "";
            extraContainer.style.display = "none";

            modal.classList.add('active');

            // Pull fresh live player tracking states right as the modal initializes
            await fetchActiveServerPlayers();
            playerListDiv.innerHTML = "";

            if (commandType === 'unban') {
                title.innerText = "Target Account Details";
                extraContainer.innerHTML = `
                    <label class="form-label">User ID to Unban</label>
                    <input type="text" id="target-unban-id" class="form-input" placeholder="e.g. 4892019">
                `;
                extraContainer.style.display = "flex";
            } else {
                if (globalPlayersCache.length === 0) {
                    playerListDiv.innerHTML = "<div style='padding:10px; color:#ccc; font-style:italic;'>Empty server or connection failed. No active players found.</div>";
                } else {
                    // Inject real user strings mapped from live api values
                    globalPlayersCache.forEach(player => {
                        // ER:LC properties: 'Permission' can filter, 'Player' contains "Username:UserId" format split
                        const playerIdentityString = player.Player || "Unknown User";
                        const cleanUsername = playerIdentityString.split(':')[0] || playerIdentityString;

                        const div = document.createElement('div');
                        div.className = 'player-item';
                        div.innerText = playerIdentityString;
                        div.onclick = () => selectPlayerItem(div, cleanUsername);
                        playerListDiv.appendChild(div);
                    });
                }

                if (commandType === 'tp') {
                    extraContainer.innerHTML = `
                        <label class="form-label">Destination Player (Bring To)</label>
                        <input type="text" id="target-destination" class="form-input" placeholder="Enter target player name">
                    `;
                    extraContainer.style.display = "flex";
                } else if (commandType === 'kick') {
                    extraContainer.innerHTML = `
                        <label class="form-label">Kick Violation Reason</label>
                        <input type="text" id="target-reason" class="form-input" placeholder="e.g. Failure to comply with staff">
                    `;
                    extraContainer.style.display = "flex";
                }
            }
        }

        function selectPlayerItem(element, username) {
            const items = document.querySelectorAll('.player-item');
            items.forEach(i => i.classList.remove('selected'));
            element.classList.add('selected');
            selectedPlayer = username;
        }

        function closeTargetModal() {
            document.getElementById('target-modal').classList.remove('active');
        }

        async function processActionExecution() {
            let finalCommandPayload = `:${activeCommand}`;

            if (activeCommand === 'unban') {
                const unbanId = document.getElementById('target-unban-id').value.trim();
                if(!unbanId) return alert("Please specify a valid User ID.");
                finalCommandPayload += ` ${unbanId}`;
            } else {
                if (!selectedPlayer) return alert("Please select an active target player item.");
                finalCommandPayload += ` "${selectedPlayer}"`;

                if (activeCommand === 'tp') {
                    const dest = document.getElementById('target-destination').value.trim();
                    if(!dest) return alert("Please specify a destination user.");
                    finalCommandPayload += ` "${dest}"`;
                } else if (activeCommand === 'kick') {
                    const reason = document.getElementById('target-reason').value.trim() || "No context specified.";
                    finalCommandPayload += ` "${reason}"`;
                }
            }

            // Command target dispatch
            const commandEndpoint = CONFIG.USE_PROXY 
                ? `${CONFIG.PROXY_URL}/command`
                : `https://api.erlc.gg/v1/server/command`;

            const requestHeaders = CONFIG.USE_PROXY 
                ? { 'Content-Type': 'application/json' } 
                : { 'Server-API-Key': apiKey, 'Content-Type': 'application/json' };

            try {
                const response = await fetch(commandEndpoint, {
                    method: 'POST',
                    headers: requestHeaders,
                    body: JSON.stringify({ command: finalCommandPayload })
                });

                if(response.ok) {
                    alert(`📡 Directives Dispatched Successfully!\n\nPayload: ${finalCommandPayload}`);
                } else {
                    alert(`⚠️ Server rejected payload command context execution structure (Status: ${response.status})`);
                }
            } catch(e) {
                console.error(e);
                // Fallback indicator message alert if CORS blocks direct browser testing 
                alert(`📡 Request generated locally:\n\nPayload: ${finalCommandPayload}\n\nNote: Direct browser api fetches can be restricted by CORS. Secure production operations should employ your backend proxy system.`);
            }

            closeTargetModal();
        }
    </script>
</body>
</html>
